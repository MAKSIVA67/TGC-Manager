workflows:
  ios-release:
    name: TCG Manager - iOS Release
    max_build_duration: 120
    integrations:
      # Name of the App Store Connect API key integration you create in
      # Codemagic's Team settings -> Integrations -> App Store Connect.
      # Must match exactly whatever name you give it there.
      app_store_connect: tcg_manager_asc
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fantasytcgmanager.app
      vars:
        # Numeric Apple ID of the app record in App Store Connect (visible
        # on the app's General/App Information page once created there --
        # NOT the bundle identifier). Fill in once that app record exists.
        APP_STORE_APPLE_ID: 0000000000
        XCODE_WORKSPACE: "capacitor-app/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          cd capacitor-app
          npm install
      - name: Sync the web app into the iOS project
        script: |
          cd capacitor-app
          node sync-web.mjs
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd capacitor-app/ios/App
          pod install
      - name: Set up code signing (automatic)
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd capacitor-app/ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build signed .ipa
        script: |
          cd capacitor-app/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - capacitor-app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
