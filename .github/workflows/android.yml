name: Build signed Android app

# Automates what used to be manual local steps (node sync-web.mjs, npx cap
# sync, ./gradlew bundleRelease assembleRelease) -- runs on every push that
# touches the game or the native shell, and can also be triggered by hand.
# Produces a signed .aab (Play Store upload) and .apk (direct install) as
# downloadable build artifacts. Does NOT auto-publish to Play Store yet --
# that needs the app to actually exist there first (see the repo's project
# memory for the submission checklist); add a play-store upload step here
# once that's done.
on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'capacitor-app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: capacitor-app
        run: npm ci

      - name: Sync web assets into the native shell
        working-directory: capacitor-app
        run: node sync-web.mjs && npx cap sync android

      - name: Restore signing keystore
        working-directory: capacitor-app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          cat > keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build signed release (AAB for Play Store + APK for direct install)
        working-directory: capacitor-app/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: |
            capacitor-app/android/app/build/outputs/bundle/release/app-release.aab
            capacitor-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
