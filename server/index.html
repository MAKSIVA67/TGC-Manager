:root{
  --bg:#080F1A;--bg2:#0D1826;--panel:#132234;--panelLight:#1C3348;
  --turf:#2FD180;--pitch:#0F2A1C;--pitchLine:#2E6B47;--pitchLine2:#14351f;--gold:#FFB020;
  --pink:#E14F8A;--cyan:#2FB6D9;--purple:#8B7FE8;--cream:#F3F6FA;--muted:#6C84A3;--danger:#FB5A5A;
  --ease-out-strong:cubic-bezier(0.23,1,0.32,1);--ease-drawer:cubic-bezier(0.32,0.72,0,1);
  /* 2026 World Cup (USA/Mexico/Canada) -- host-nation + regional accent tones:
     torch red (Canada), grass green (Mexico), deep blue (USA), plus the
     desert-orange/Great-Lakes-teal pairing reported as part of the
     tournament's wider 12-tone identity, alongside its gold/black/white
     core (gold already covered by --gold above). */
  --wc-red:#E6394A;--wc-green:#2FA84F;--wc-blue:#2A4B9B;--wc-orange:#E8863A;--wc-teal:#1FA3A0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior-y:contain}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0}
#stage{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);position:relative;overflow-x:clip;
  background-image:radial-gradient(circle at 12% 0%, #FFB0201f, transparent 38%), radial-gradient(circle at 88% 4%, #E6394A16, transparent 36%), radial-gradient(circle at 90% 60%, #2FA84F14, transparent 42%), radial-gradient(circle at 6% 70%, #1FA3A014, transparent 40%), radial-gradient(circle at 50% 100%, #2A4B9B18, transparent 46%);}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
input,textarea{font-family:inherit;font-size:16px}
.display{font-family:'Teko',system-ui,sans-serif;font-weight:700;letter-spacing:0.02em}
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.between{justify-content:space-between}
.center{justify-content:center}
.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wfull{width:100%}
.muted{color:var(--muted)}
.panel{background:var(--panel);border:1px solid var(--panelLight);border-radius:16px;box-shadow:0 10px 24px -14px #030B14cc}
.grainOverlay{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:.05;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");background-size:180px 180px}
.tabbtn .tabPill{position:absolute;inset:2px 6px;border-radius:12px;background:var(--turf);opacity:0;transform:scale(.85);transition:opacity 200ms var(--ease-out-strong),transform 200ms var(--ease-out-strong);z-index:0}
.tabbtn.tabActive .tabPill{opacity:.16;transform:scale(1)}
.tabbtn{position:relative}
.tabbtn>*{position:relative;z-index:1}
.btn{border:none;border-radius:12px;font-weight:800}
.scrimtap{transition:transform 160ms var(--ease-out-strong)}
.scrimtap:active{transform:scale(0.95)}
.tabbar{position:fixed;bottom:0;left:50%;width:100%;max-width:480px;transform:translateX(-50%);background:var(--panel);border-top:1px solid var(--panelLight);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:transparent}
.hdr{padding:calc(18px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--panelLight);position:sticky;top:0;background:var(--bg);z-index:15}
.pill{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:12px;background:var(--panel)}
.view{padding:14px 16px calc(100px + env(safe-area-inset-bottom))}
.cardTile{position:relative;border-radius:16px;padding:12px 12px 12px 16px;text-align:left;width:100%;background:var(--panel);border-top:1px solid var(--panelLight);border-right:1px solid var(--panelLight);border-bottom:1px solid var(--panelLight);}
.badge{font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:999px}
.avatarCircle{display:flex;align-items:center;justify-content:center;border-radius:999px}
.modalWrap{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6);opacity:1;transition:opacity 200ms ease-out}
.modalSheet{width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:16px calc(16px) calc(16px + env(safe-area-inset-bottom));max-height:72vh;max-height:72dvh;overflow-y:auto;background:var(--panel);transform:translateY(0);transition:transform 320ms var(--ease-drawer)}
.overlayFull{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;opacity:1;transition:opacity 220ms ease-out}
@starting-style{
  .modalWrap{opacity:0}
  .modalSheet{transform:translateY(100%)}
  .overlayFull{opacity:0}
  .chatComposer{transform:translateX(-50%) translateY(100%)}
}
@keyframes confettiFall{to{transform:translateY(105vh) rotate(360deg);opacity:.4}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04);opacity:1}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes floatBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
@keyframes spinRays{to{transform:rotate(360deg)}}
@keyframes shineSweep{0%{transform:translateX(-150%)}60%{transform:translateX(150%)}100%{transform:translateX(150%)}}
@keyframes riseIn{0%{transform:translateY(120px) scale(.55);opacity:0}70%{transform:translateY(-10px) scale(1.05);opacity:1}100%{transform:translateY(0) scale(1)}}
@keyframes pulseLive{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes wanderA{0%{transform:translate(0,0)}25%{transform:translate(4px,-3px)}50%{transform:translate(-3px,3px)}75%{transform:translate(3px,4px)}100%{transform:translate(0,0)}}
@keyframes wanderB{0%{transform:translate(0,0)}30%{transform:translate(-4px,3px)}60%{transform:translate(4px,-4px)}100%{transform:translate(0,0)}}
@keyframes wanderC{0%{transform:translate(0,0)}40%{transform:translate(3px,3px)}70%{transform:translate(-4px,-2px)}100%{transform:translate(0,0)}}
@keyframes wanderD{0%{transform:translate(0,0)}35%{transform:translate(-3px,-4px)}65%{transform:translate(4px,3px)}100%{transform:translate(0,0)}}
.confettiPiece{position:absolute;top:-20px;pointer-events:none}
.chatComposer{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));left:50%;width:100%;max-width:480px;box-sizing:border-box;display:flex;gap:8px;padding:10px 16px;background:var(--panel);border-top:1px solid var(--panelLight);z-index:20;transform:translateX(-50%) translateY(0);transition:transform 240ms var(--ease-out-strong)}
@media (prefers-reduced-motion: reduce){
  [style*="twinkle"],[style*="shineSweep"],[style*="floatBounce"],[style*="spinRays"],
  [style*="wanderA"],[style*="wanderB"],[style*="wanderC"],[style*="wanderD"]{animation:none !important}
  .confettiPiece{animation:none !important;opacity:0}
}

function pickWeighted(lockedPool, weights){
  const buckets = RARITY_ORDER.map(r=>({r,pool:lockedPool.filter(p=>p.rarity===r),w:weights[r]||0})).filter(b=>b.pool.length>0 && b.w>0);
  if(!buckets.length){ return lockedPool.length ? lockedPool[Math.floor(Math.random()*lockedPool.length)] : null; }
  const totalW = buckets.reduce((s,b)=>s+b.w,0);
  let roll = Math.random()*totalW;
  for(const b of buckets){ if(roll<b.w) return b.pool[Math.floor(Math.random()*b.pool.length)]; roll -= b.w; }
  return buckets[buckets.length-1].pool[Math.floor(Math.random()*buckets[buckets.length-1].pool.length)];
}

function buildSlots(formationKey, side){
  const counts = FORMATIONS[formationKey].counts;
  const yMap = side==="my" ? MY_Y : OPP_Y;
  const slots = [];
  ["GK","DEF","MID","FWD"].forEach(pos=>{
    const n = counts[pos];
    const xs = ROW_XS[n] || [50];
    xs.forEach((x,i)=>slots.push({id:pos+(n>1?i+1:""),position:pos,label:pos,x,y:yMap[pos]}));
  });
  return slots;
}
function zoneOf(id){ return id.replace(/\d+$/,""); }
function computeZone(zoneKey, myLU, oppLU){
  const myTotal = Object.entries(myLU).reduce((s,[id,p])=>s+(zoneOf(id)===zoneKey&&p?p.power:0),0);
  const oppTotal = Object.entries(oppLU).reduce((s,[id,p])=>s+(zoneOf(id)===zoneKey&&p?p.power:0),0);
  const result = myTotal>oppTotal?"win":myTotal<oppTotal?"lose":"tie";
  return {myTotal,oppTotal,result};
}

let actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx && actx.state==="suspended") actx.resume(); }
function tone(freq,dur,type,vol,delay){
  if(!actx) return; type=type||"sine"; vol=vol||0.15; delay=delay||0;
  const t0=actx.currentTime+delay, osc=actx.createOscillator(), gain=actx.createGain();
  osc.type=type; osc.frequency.value=freq;
  gain.gain.setValueAtTime(vol,t0); gain.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  osc.connect(gain); gain.connect(actx.destination); osc.start(t0); osc.stop(t0+dur+0.02);
}
function noiseBurst(dur,vol,delay){
  if(!actx) return; vol=vol||0.1; delay=delay||0;
  const t0=actx.currentTime+delay, len=Math.max(1,Math.floor(actx.sampleRate*dur));
  const buffer=actx.createBuffer(1,len,actx.sampleRate), data=buffer.getChannelData(0);
  for(let i=0;i<len;i++) data[i]=Math.random()*2-1;
  const src=actx.createBufferSource(); src.buffer=buffer;
  const gain=actx.createGain(); gain.gain.setValueAtTime(vol,t0); gain.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  src.connect(gain); gain.connect(actx.destination); src.start(t0);
}

function startSpinAnimation(){
  const s = state.shop;
  const wrap = document.getElementById("spinStrip");
  const track = document.getElementById("spinTrack");
  if(!wrap || !track) return;
  const tickTimes = [90,180,280,390,510,650,800,970,1160,1380,1630,1920,2260,2650];
  tickTimes.forEach((t)=>setTimeout(()=>playTap(), t));
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const width = wrap.offsetWidth;
      const target = width/2 - SPIN_ITEM_W/2 - s.spinFinalIndex*SPIN_STEP;
      track.style.transition = "transform 2.9s cubic-bezier(0.1,0.7,0.15,1)";
      track.style.transform = `translateX(${target}px)`;
    });
  });
  const onEnd = (e)=>{
    if(e.propertyName !== "transform") return;
    track.removeEventListener("transitionend", onEnd);
    landPack();
  };
  track.addEventListener("transitionend", onEnd);
}
function landPack(){
  const s = state.shop;
  const pick = s.pendingPick;
  if(!pick){ return; }
  state.players = state.players.map(p=> p.id===pick.id ? {...p, owned:true} : p);
  if(isTopTier(pick.rarity)){ playFanfare(); playImpact(); } else if(isHighTier(pick.rarity)) playSparkle(); else playChime();
  s.revealed = pick; s.phase="revealed"; s.pendingPick=null;
  render();
}

function currentClub(){ return SEASON_CLUBS[(state.season.matchday-1)%SEASON_CLUBS.length]; }
function pitchHTML(){
  const pl = state.play;
  const showMy = pl.phase!=="__never";
  const mySlots = buildSlots(pl.formationKey,"my");
  const showOpp = pl.phase!=="building";
  const zr = pl.phase==="result" ? (pl.finalResult && pl.finalResult.zoneResults) : (pl.phase==="halftime"||pl.phase==="battling") ? pl.zoneResultsLive : null;
  const bands = {FWD:[0,25],MID:[25,50],DEF:[50,75],GK:[75,100]};
  const zoneShade = zr ? Object.keys(bands).map(z=>{
    const [top,bottom]=bands[z]; const r=zr[z];
    return `<div style="position:absolute;left:0;right:0;top:${top}%;height:${bottom-top}%;background:${r==="win"?COLORS.turf+"22":r==="lose"?COLORS.danger+"22":"transparent"}"></div>`;
  }).join("") : "";
  const WANDER_KF = ["wanderA","wanderB","wanderC","wanderD"];
  function chip(p, isMy, key, i){
    const hasBall = pl.phase==="battling" && key && pl.ballOwnerKey===key;
    if(!p) return `<div class="avatarCircle" style="width:40px;height:40px;border:2px dashed ${COLORS.muted};color:${COLORS.muted};font-weight:900">+</div>`;
    const rarity = RARITY[p.rarity];
    const avatar = `<div id="${key?"avatar-"+key:""}" class="avatarCircle" style="width:40px;height:40px;font-weight:900;font-size:14px;background:${rarity.color};color:${COLORS.bg};border:2px solid ${hasBall?COLORS.gold:"rgba(255,255,255,.7)"};box-shadow:${hasBall?`0 0 14px ${COLORS.gold}cc`:`0 0 12px ${rarity.color}66`};transition:box-shadow .3s ease,border-color .3s ease">${p.power}</div>`;
    const nameTag = `<div style="font-size:9px;font-weight:800;margin-top:2px;padding:0 4px;border-radius:4px;color:${COLORS.cream};background:rgba(0,0,0,.5)">${esc(p.name.split(" ").slice(-1)[0])}</div>`;
    const inner = `<div class="col" style="align-items:center">${avatar}${nameTag}</div>`;
    if(pl.phase!=="battling" || !key) return inner;
    const kf = WANDER_KF[i%4], dur=(2.8+(i%4)*0.4).toFixed(1), delay=((i%5)*0.2).toFixed(1);
    return `<div style="animation:${kf} ${dur}s ease-in-out infinite;animation-delay:${delay}s"><div id="chip-${key}" style="transform:scale(${hasBall?1.22:1});transition:transform .3s ease">${inner}</div></div>`;
  }
  const oppSlots = pl.oppSlots || [];
  const battling = pl.phase==="battling";
  const ballList = battling ? motionSlotList() : [];
  const ballSlot = ballList.find(m=>m.key===pl.ballOwnerKey);
  return `<div style="position:relative;border-radius:16px;overflow:hidden;margin-bottom:16px;height:340px;background:repeating-linear-gradient(180deg, ${COLORS.pitch} 0px, ${COLORS.pitch} 34px, #14351f 34px, #14351f 68px);box-shadow:inset 0 0 60px rgba(0,0,0,.45)">

    <div style="position:absolute;width:80px;height:80px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid ${COLORS.pitchLine}"></div>
    ${zoneShade}
    ${showOpp ? oppSlots.map((slot,i)=>`<div style="position:absolute;left:${slot.x}%;top:${slot.y}%;transform:translate(-50%,-50%)">${chip((pl.oppLineup||{})[slot.id],false,"opp-"+slot.id,i)}</div>`).join("") : ""}
    ${mySlots.map((slot,i)=>`<button data-action="${pl.phase==="building"?"open-slot-picker":"noop"}" data-slot-id="${slot.id}" style="position:absolute;left:${slot.x}%;top:${slot.y}%;transform:translate(-50%,-50%);background:none;border:none;padding:0" class="scrimtap">${chip(pl.myLineup[slot.id],true,"my-"+slot.id,i)}</button>`).join("")}
    ${battling ? `<div id="ballMarker" style="position:absolute;left:${ballSlot?ballSlot.x:50}%;top:${ballSlot?ballSlot.y:50}%;transform:translate(-50%,-180%);font-size:16px;transition:left .4s ease, top .4s ease;display:${ballSlot?"block":"none"}">⚽</div>` : ""}
    ${pl.phase==="battling" ? `<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:900;letter-spacing:.15em;color:${COLORS.gold};animation:pulseLive 1.2s ease-in-out infinite">● LIVE</div>` : ""}
  </div>`;
}
function playView(){
  const pl = state.play;
  const mySlots = buildSlots(pl.formationKey,"my");
  const filled = Object.values(pl.myLineup).filter(Boolean).length;
  const isComplete = filled===mySlots.length;
  const usedIds = Object.values(pl.myLineup).filter(Boolean).map(p=>p.id);

  let modals = "";
  if(pl.activeSlot){
    const slot = pl.activeSlot;
    const options = state.players.filter(p=>p.owned && p.position===slot.position && !usedIds.includes(p.id));
    modals += `<div class="modalWrap" data-action="close-modal" data-modal="active">
      <div class="modalSheet" data-action="noop">
        <div class="row between" style="margin-bottom:12px"><div style="font-weight:900;color:${COLORS.cream}">Choose your ${slot.label}</div><button data-action="close-modal" data-modal="active" style="background:none;border:none;color:${COLORS.muted}">${icon("X",18,COLORS.muted)}</button></div>
        ${pl.myLineup[slot.id] ? `<button data-action="remove-slot" data-slot-id="${slot.id}" class="btn scrimtap wfull" style="padding:10px;margin-bottom:12px;font-size:13px;background:${COLORS.danger}22;color:${COLORS.danger}">Remove current player</button>` : ""}
        <div class="grid2">
          ${options.map(p=>playerCard(p,{mode:"select",action:"assign-player",disabled:false})).join("")}
          ${options.length===0 ? `<div style="grid-column:1/3;text-align:center;padding:16px 0;font-size:13px;color:${COLORS.muted}">No available ${slot.position} cards. Try the Shop!</div>` : ""}
        </div>
      </div>
    </div>`;
  }
  if(pl.subSlot){
    const slot = pl.subSlot;
    const bench = state.players.filter(p=>p.owned && p.position===slot.position && !usedIds.includes(p.id));
    modals += `<div class="modalWrap" data-action="close-modal" data-modal="sub">
      <div class="modalSheet" data-action="noop">
        <div class="row between" style="margin-bottom:12px"><div style="font-weight:900;color:${COLORS.cream}">Sub in a ${slot.position}</div><button data-action="close-modal" data-modal="sub" style="background:none;border:none;color:${COLORS.muted}">${icon("X",18,COLORS.muted)}</button></div>
        <div class="grid2">
          ${bench.map(p=>playerCard(p,{mode:"select",action:"sub-player"})).join("")}
          ${bench.length===0 ? `<div style="grid-column:1/3;text-align:center;padding:16px 0;font-size:13px;color:${COLORS.muted}">No bench ${slot.position} available.</div>` : ""}
        </div>
      </div>
    </div>`;
  }
  let body = "";
  if(pl.phase==="building"){
    body += `<div style="text-align:center;font-size:12px;font-weight:800;color:${COLORS.cyan};margin-bottom:8px">Season ${state.season.number} · Matchday ${state.season.matchday}/6 vs ${currentClub()}</div>
    <div class="row" style="gap:8px;margin-bottom:12px">
      ${Object.entries(FORMATIONS).map(([key,f])=>`<button data-action="set-formation" data-key="${key}" class="btn scrimtap" style="flex:1;padding:8px 0;font-size:10px;background:${pl.formationKey===key?COLORS.turf:COLORS.panel};color:${pl.formationKey===key?COLORS.bg:COLORS.muted}">${f.name}</button>`).join("")}
    </div>`;
  }
  if(pl.phase==="battling"||pl.phase==="result"||pl.phase==="halftime"){
    body += `<div class="row center" style="gap:16px;margin-bottom:8px">
      <span style="font-size:12px;font-weight:800;color:${COLORS.muted}">YOU</span>
      <div style="font-size:24px;font-weight:900;color:${COLORS.turf}">${pl.myGoals}</div>
      <span style="font-size:13px;font-weight:900;color:${COLORS.muted}">—</span>
      <div style="font-size:24px;font-weight:900;color:${COLORS.danger}">${pl.oppGoals}</div>
      <span style="font-size:12px;font-weight:800;color:${COLORS.muted}">THEM</span>
    </div>`;
    if(pl.isChallengeMatch && pl.opponentMeta){
      body += `<div style="text-align:center;font-size:11px;font-weight:800;margin-bottom:8px;color:${COLORS.pink}">⚔️ Friendly vs ${esc(pl.opponentMeta.profileName)}'s ${esc(pl.opponentMeta.teamName)} ${pl.opponentMeta.avatar}</div>`;
    }
  }
  if(pl.phase==="battling") body += `<div style="text-align:center;font-size:12px;font-weight:800;color:${COLORS.gold};margin-bottom:8px">⏱ <span id="matchMinuteText">${pl.matchMinute}</span>'</div>`;
  if(pl.phase==="halftime") body += `<div style="text-align:center;font-size:12px;font-weight:800;color:${COLORS.gold};margin-bottom:8px">⏸ HALF-TIME — 45'</div>`;
  if(pl.phase==="result") body += `<div style="text-align:center;font-size:12px;font-weight:800;color:${COLORS.gold};margin-bottom:8px">FULL TIME — 90'</div>`;

  body += pitchHTML();

  if(pl.phase==="battling"||pl.phase==="result"||pl.phase==="halftime"){
    body += `<div class="panel" style="padding:10px 12px;margin-bottom:16px;text-align:center;font-size:13px;font-weight:800;color:${COLORS.cream};min-height:20px">${pl.commentary}</div>`;
  }

  if(pl.phase==="building"){
    body += `<button data-action="equip-best" class="btn scrimtap wfull row center" style="gap:6px;padding:10px 0;margin-bottom:10px;font-size:12px;font-weight:800;background:${COLORS.panel};color:${COLORS.gold};border:1px solid ${COLORS.gold}55">${icon("Sparkles",14,COLORS.gold)} EQUIP BEST SQUAD</button>
    <div style="text-align:center;font-size:12px;color:${COLORS.muted};margin-bottom:12px">${filled}/${mySlots.length} positions filled — tap a slot to assign a player</div>
    <button data-action="kickoff" ${!isComplete?"disabled":""} class="display btn scrimtap wfull" style="padding:14px 0;font-size:18px;background:${COLORS.turf};color:${COLORS.bg};box-shadow:0 4px 0 #1C9E5C;opacity:${!isComplete?0.4:1}">▶️ KICK OFF</button>
    <div style="text-align:center;font-size:11px;margin-top:8px;color:${COLORS.muted}">Want to challenge a friend instead? Head to the Friends tab — this squad is what you'll battle with.</div>`;
  }
  if(pl.phase==="halftime"){
    body += `<div style="font-size:11px;font-weight:800;letter-spacing:.1em;color:${COLORS.muted};margin-bottom:8px">${pl.halfSubUsed?"SUBSTITUTION USED":"ONE SUBSTITUTION AVAILABLE"}</div>
    <div class="col" style="gap:8px;margin-bottom:16px">
      ${mySlots.map(slot=>{ const p=pl.myLineup[slot.id]; if(!p) return ""; return `
        <div class="row panel" style="padding:8px;gap:12px">
          <div class="avatarCircle" style="width:34px;height:34px;font-weight:900;font-size:13px;background:${RARITY[p.rarity].color};color:${COLORS.bg}">${p.power}</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:800;color:${COLORS.cream}">${esc(p.name)}</div><div style="font-size:10px;color:${COLORS.muted}">${slot.position}</div></div>
          <button data-action="open-sub" data-slot-id="${slot.id}" ${pl.halfSubUsed?"disabled":""} class="btn scrimtap row center" style="gap:4px;padding:6px 12px;font-size:10px;background:${COLORS.panelLight};color:${COLORS.gold};opacity:${pl.halfSubUsed?0.3:1}">${icon("Repeat",12,COLORS.gold)} SWAP</button>
        </div>`; }).join("")}
    </div>
    <button data-action="continue-second-half" class="display btn scrimtap wfull" style="padding:14px 0;font-size:18px;background:${COLORS.turf};color:${COLORS.bg};box-shadow:0 4px 0 #1C9E5C">KICK OFF 2ND HALF</button>`;
  }
  if(pl.phase==="result" && pl.finalResult){
    const fr = pl.finalResult;
    body += `<div style="border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;background:${fr.won?COLORS.turf+"22":fr.isDraw?COLORS.cyan+"22":COLORS.danger+"22"};border:2px solid ${fr.won?COLORS.turf:fr.isDraw?COLORS.cyan:COLORS.danger};animation:${fr.won||fr.isDraw?"popIn .4s var(--ease-out-strong)":"shake .4s ease"}">
      <div style="font-size:22px;font-weight:900;margin-bottom:4px;color:${fr.won?COLORS.turf:fr.isDraw?COLORS.cyan:COLORS.danger}">${fr.won?"VICTORY! 🎉":fr.isDraw?"DRAW":"DEFEAT"}</div>
      <div style="font-size:13px;margin-bottom:4px;color:${COLORS.cream}">${fr.line}</div>
      <div style="font-size:11px;margin-bottom:8px;color:${COLORS.muted}">Zones won: ${fr.myZoneWins} - ${fr.oppZoneWins}</div>
      <div style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;background:${COLORS.panelLight}">${icon("Gem",14,COLORS.gold)} <span style="font-size:13px;font-weight:800;color:${COLORS.gold}">+${fr.gemsEarned} gems</span></div>
    </div>
    <div class="grid2" style="margin-bottom:16px">
      ${ZONES.map(z=>`<div class="row between panel" style="padding:8px 10px;border:1px solid ${fr.zoneResults[z.key]==="win"?COLORS.turf:fr.zoneResults[z.key]==="lose"?COLORS.danger:COLORS.muted}">
        <span style="font-size:12px;font-weight:800;color:${COLORS.cream}">${z.label}</span>
        <span style="font-size:12px;font-weight:900;color:${fr.zoneResults[z.key]==="win"?COLORS.turf:fr.zoneResults[z.key]==="lose"?COLORS.danger:COLORS.muted}">${fr.zoneResults[z.key]==="win"?"WON":fr.zoneResults[z.key]==="lose"?"LOST":"TIE"}</span>
      </div>`).join("")}
    </div>
    ${pl.isChallengeMatch ? `<div style="font-size:10px;text-align:center;margin-bottom:16px;color:${COLORS.muted}">⚔️ Friendly challenge — season & matchday weren't affected.</div>` : ""}
    ${pl.seasonSummary ? `<div style="border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;background:linear-gradient(135deg, ${COLORS.purple}, ${COLORS.pink})">
      <div style="font-weight:900;font-size:17px;margin-bottom:4px;color:#fff">🏁 Season ${pl.seasonSummary.number} Complete!</div>
      <div style="font-size:13px;margin-bottom:4px;color:#ffffffdd">${pl.seasonSummary.wins}W - ${pl.seasonSummary.draws||0}D - ${pl.seasonSummary.losses}L · ${pl.seasonSummary.points} pts</div>
      <div style="font-size:13px;font-weight:800;margin-bottom:10px;color:${COLORS.gold}">+${pl.seasonSummary.bonus} bonus gems!</div>
      <button data-action="close-season-summary" class="btn scrimtap" style="padding:8px 16px;font-size:13px;background:#fff;color:${COLORS.purple}">Awesome!</button>
    </div>` : ""}
    <button data-action="play-again" class="btn scrimtap wfull" style="padding:16px 0;font-size:17px;font-weight:900;letter-spacing:.02em;background:${COLORS.panelLight};color:${COLORS.cream}">PLAY AGAIN</button>`;
  }

  const confetti = (state.confettiOn && pl.phase==="result" && pl.finalResult && pl.finalResult.won) ? confettiHTML() : "";
  return `<div class="view" style="padding-top:8px">
    ${confetti}
    ${state.stats.streak>=2 && pl.phase==="building" ? `<div class="row center" style="gap:6px;margin-bottom:8px;font-size:13px;font-weight:800;color:${COLORS.gold}">${icon("Flame",16,COLORS.gold)} ${state.stats.streak} win streak — opponents are getting tougher!</div>` : ""}
    ${body}
    ${modals}
  </div>`;
}
function confettiHTML(){
  let pieces = "";
  const emo = ["⚽","🎉","⭐","✨","🔥","🏆","🟢","🔴","🔵","🟡"];
  for(let i=0;i<32;i++){
    const left = Math.random()*100, delay=(Math.random()*0.4).toFixed(2), dur=(1.6+Math.random()).toFixed(2), size=(14+Math.random()*10).toFixed(0);
    pieces += `<div class="confettiPiece" style="left:${left}%;font-size:${size}px;animation:confettiFall ${dur}s ease-in ${delay}s forwards">${emo[i%emo.length]}</div>`;
  }
  return `<div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:45">${pieces}</div>`;
}

// ---------- Friends view (Phase B) ----------
function friendsView(){
  const ui = state.friendsUI;
  if(ui.chat.friendId) return `<div class="view">${chatSection()}</div>`;
  if(ui.viewingChallengeId) return `<div class="view">${challengeResultSection()}</div>`;
  if(ui.trade.friendId) return `<div class="view">${tradeComposerSection()}</div>`;
  if(ui.viewingTradeId) return `<div class="view">${tradeReviewSection()}</div>`;
  const sub = ui.subTab;
  const badges = notifBadges();
  // "Friends" carries challenge + chat notifications (both surface inline
  // per-friend row there, not on their own sub-tab) -- Requests/Trades each
  // have their own dedicated sub-tab already, so their counts go there.
  const tabs = [
    {key:"friends", label:"Friends", count: badges.challenges + badges.chat},
    {key:"requests", label:"Requests", count: badges.requests},
    {key:"trades", label:"Trades", count: badges.trades},
    {key:"find", label:"Find"},
  ];
  return `<div class="view">
    <div class="row" style="gap:8px;margin-bottom:16px">
      ${tabs.map(t=>{
        const active = sub===t.key;
        const textColor = active ? COLORS.bg : (t.count ? COLORS.danger : COLORS.muted);
        return `<button data-action="friends-subtab" data-subtab="${t.key}" class="btn scrimtap" style="flex:1;padding:10px 4px;font-size:11px;font-weight:800;background:${active?COLORS.turf:COLORS.panel};color:${textColor}">${t.label.toUpperCase()}${t.count?` (${t.count})`:""}</button>`;
      }).join("")}
    </div>
    ${sub==="friends" ? friendsListSection() : sub==="requests" ? friendsRequestsSection() : sub==="trades" ? friendsTradesSection() : friendsFindSection()}
  </div>`;
}
function friendsListSection(){
  const ui = state.friendsUI;
  if(!ui.friendsLoaded) return `<div style="font-size:12px;color:${COLORS.muted}">Loading…</div>`;
  if(!ui.friends.length) return `<div class="panel" style="padding:20px;text-align:center;font-size:13px;color:${COLORS.muted}">No friends yet — head to the Find tab to search for players.</div>`;
  return (ui.challengeStatus ? `<div style="font-size:12px;margin-bottom:12px;color:${COLORS.muted}">${esc(ui.challengeStatus)}</div>` : "")
    + ui.friends.map(f=>{
    const myId = state.session.user.id;
    const relevant = (ui.challenges||[]).filter(c=> (c.challenger_id===f.id && c.opponent_id===myId) || (c.challenger_id===myId && c.opponent_id===f.id));
    const challenge = relevant[0] || null;
    let challengeButtons;
    if(challenge && challenge.status==="pending"){
      challengeButtons = challenge.challenger_id===myId
        ? `<span style="font-size:10px;font-weight:800;color:${COLORS.gold}">PENDING</span>`
        : `<button data-action="challenge-accept" data-challenge-id="${challenge.id}" class="btn scrimtap" style="padding:6px 10px;font-size:10px;background:${COLORS.turf};color:${COLORS.bg}">Accept</button>
           <button data-action="challenge-decline" data-challenge-id="${challenge.id}" class="btn scrimtap panel" style="padding:6px 10px;font-size:10px;color:${COLORS.danger}">Decline</button>`;
    } else {
      challengeButtons = `<button data-action="friend-send-challenge" data-target-id="${f.id}" class="btn scrimtap panel" style="padding:6px 10px;font-size:10px;color:${COLORS.pink}">⚔️ Challenge</button>`
        + (challenge && challenge.status==="completed" ? `<button data-action="challenge-view" data-challenge-id="${challenge.id}" class="btn scrimtap panel" style="padding:6px 10px;font-size:10px;color:${COLORS.cyan}">Result</button>` : "");
    }
    return `
    <div class="panel" style="padding:14px;margin-bottom:10px">
      <div class="row between" style="gap:10px;margin-bottom:8px">
        <div class="row" style="gap:10px">
          <div class="avatarCircle" style="width:40px;height:40px;font-size:18px;background:${COLORS.panelLight}">${esc(f.avatar||"⚽")}</div>
          <div>
            <div style="font-weight:800;font-size:13px;color:${COLORS.cream}">${esc(f.display_name||"Player")}</div>
            <div style="font-size:11px;color:${COLORS.muted}">${esc(f.team_name||"")}</div>
          </div>
        </div>
        <div class="row" style="gap:6px">
          <button data-action="friend-open-chat" data-friend-id="${f.id}" data-friend-name="${esc(f.display_name||"Player")}" class="btn scrimtap panel" style="position:relative;padding:6px 12px;font-size:11px;color:${COLORS.turf}">Chat${ui.chatUnreadFriendIds.includes(f.id) ? `<span style="position:absolute;top:-4px;right:-4px;width:9px;height:9px;border-radius:999px;background:${COLORS.danger}"></span>` : ""}</button>
          <button data-action="trade-open-composer" data-friend-id="${f.id}" data-friend-name="${esc(f.display_name||"Player")}" class="btn scrimtap panel" style="padding:6px 12px;font-size:11px;color:${COLORS.gold}">Trade</button>
        </div>
      </div>
      <div class="row" style="gap:6px;justify-content:flex-end">${challengeButtons}</div>
    </div>
  `;}).join("");
}
function chatSection(){
  const chat = state.friendsUI.chat;
  const myId = state.session.user.id;
  return `
    <div class="row between" style="margin-bottom:12px;align-items:center">
      <button data-action="chat-close" class="scrimtap" style="background:none;border:none;color:${COLORS.gold};font-size:12px;font-weight:800">‹ Back</button>
      <div style="font-weight:800;font-size:14px;color:${COLORS.cream}">${esc(chat.friendName)}</div>
      <span style="width:40px"></span>
    </div>
    <div id="chatScroll" style="height:360px;height:calc(100dvh - 260px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:10px;margin-bottom:12px;border-radius:12px;background:${COLORS.panel}">
      ${chat.loading ? `<div style="font-size:12px;color:${COLORS.muted}">Loading…</div>`
        : !chat.messages.length ? `<div style="font-size:12px;color:${COLORS.muted};text-align:center;margin-top:20px">Say hello!</div>`
        : chat.messages.map(m=>{
            const mine = m.sender_id===myId;
            return `<div style="align-self:${mine?"flex-end":"flex-start"};max-width:75%;padding:8px 12px;border-radius:14px;font-size:13px;background:${mine?COLORS.turf:COLORS.panelLight};color:${mine?COLORS.bg:COLORS.cream}">${esc(m.body)}</div>`;
          }).join("")}
    </div>
    <div class="chatComposer">
      <input data-field="chatDraft" value="${esc(chat.draft)}" placeholder="Message…" maxlength="500" style="flex:1;border-radius:12px;padding:10px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${COLORS.cream}" />
      <button data-action="chat-send" class="btn scrimtap" style="padding:10px 16px;font-size:12px;font-weight:800;background:${COLORS.turf};color:${COLORS.bg}">Send</button>
    </div>
  `;
}
function challengeResultSection(){
  const ui = state.friendsUI;
  const challenge = (ui.challenges||[]).find(c=>c.id===ui.viewingChallengeId);
  const backBtn = `<button data-action="challenge-close-view" class="btn scrimtap" style="margin-top:12px;padding:10px 16px;font-size:12px;background:${COLORS.panel};color:${COLORS.cream}">Back</button>`;
  if(!challenge) return `<div style="font-size:12px;color:${COLORS.muted}">Challenge not found.</div>${backBtn}`;
  const myId = state.session.user.id;
  const outcome = viewerChallengeOutcome(challenge, myId);
  const won = outcome.result==="win", isDraw = outcome.result==="draw";
  const otherName = esc((challenge.otherProfile&&challenge.otherProfile.display_name)||"Player");
  return `
    <div class="row between" style="margin-bottom:12px;align-items:center">
      <button data-action="challenge-close-view" class="scrimtap" style="background:none;border:none;color:${COLORS.gold};font-size:12px;font-weight:800">‹ Back</button>
      <div style="font-weight:800;font-size:14px;color:${COLORS.cream}">vs ${otherName}</div>
      <span style="width:40px"></span>
    </div>
    <div style="border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;background:${won?COLORS.turf+"22":isDraw?COLORS.cyan+"22":COLORS.danger+"22"};border:2px solid ${won?COLORS.turf:isDraw?COLORS.cyan:COLORS.danger}">
      <div style="font-size:22px;font-weight:900;color:${won?COLORS.turf:isDraw?COLORS.cyan:COLORS.danger}">${won?"VICTORY! 🎉":isDraw?"DRAW":"DEFEAT"}</div>
    </div>
    <div class="grid2">
      ${ZONES.map(z=>`<div class="row between panel" style="padding:8px 10px;border:1px solid ${outcome.zones[z.key]==="win"?COLORS.turf:outcome.zones[z.key]==="lose"?COLORS.danger:COLORS.muted}">
        <span style="font-size:12px;font-weight:800;color:${COLORS.cream}">${z.label}</span>
        <span style="font-size:12px;font-weight:900;color:${outcome.zones[z.key]==="win"?COLORS.turf:outcome.zones[z.key]==="lose"?COLORS.danger:COLORS.muted}">${outcome.zones[z.key]==="win"?"WON":outcome.zones[z.key]==="lose"?"LOST":"TIE"}</span>
      </div>`).join("")}
    </div>
  `;
}
function tradeComposerSection(){
  const t = state.friendsUI.trade;
  // Exclude cards the OTHER side already owns from each list -- a card
  // that side already has can never be a valid trade result (the
  // execute_trade RPC's duplicate-ownership guard would just reject it),
  // so don't let it even be selected in the first place.
  const myCards = state.players.filter(p=>p.owned && !t.friendCollection.includes(p.id));
  const theirCards = t.friendCollection.map(id=> state.players.find(p=>p.id===id)).filter(p=>p && !p.owned);
  return `
    <div class="row between" style="margin-bottom:12px;align-items:center">
      <button data-action="trade-close-composer" class="scrimtap" style="background:none;border:none;color:${COLORS.gold};font-size:12px;font-weight:800">‹ Back</button>
      <div style="font-weight:800;font-size:14px;color:${COLORS.cream}">Trade with ${esc(t.friendName)}</div>
      <span style="width:40px"></span>
    </div>
    ${t.status ? `<div style="font-size:12px;margin-bottom:12px;color:${COLORS.muted}">${esc(t.status)}</div>` : ""}
    <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.muted}">YOU GIVE (tap to select)</div>
    <div class="grid2" style="margin-bottom:12px">
      ${myCards.map(p=>playerCard(p,{mode:"trade-select", action:"trade-toggle-offer", selected:t.offerIds.includes(p.id)})).join("")}
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:4px;color:${COLORS.muted}">GEMS TO OFFER (optional)</div>
      <input data-field="tradeGems" type="number" min="0" value="${t.gems}" style="width:100%;box-sizing:border-box;border-radius:12px;padding:10px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${COLORS.cream}" />
    </div>

function tradeReviewSection(){

      ${sides.youGet.cardIds.map(id=>`<div style="font-size:13px;color:${COLORS.cream}">${esc(cardName(id))}</div>`).join("")}
      ${sides.youGet.gems>0 ? `<div style="font-size:13px;color:${COLORS.gold}">${sides.youGet.gems} gems</div>` : ""}

      <div class="row" style="gap:8px">

        <button data-action="trade-respond" data-trade-id="${trade.id}" data-decision="decline" class="btn scrimtap wfull panel" style="padding:12px 0;font-size:13px;color:${COLORS.danger}">Decline</button>
      </div>
    ` : trade.status==="pending" && isInitiator ? `
      <button data-action="trade-respond" data-trade-id="${trade.id}" data-decision="cancel" class="btn scrimtap wfull panel" style="padding:12px 0;font-size:13px;color:${COLORS.danger}">Cancel Offer</button>
    ` : ""}
  `;

function friendsTradesSection(){
  const ui = state.friendsUI;
  if(!ui.tradesLoaded) return `<div style="font-size:12px;color:${COLORS.muted}">Loading…</div>`;
  if(!ui.trades.length) return `<div class="panel" style="padding:20px;text-align:center;font-size:13px;color:${COLORS.muted}">No trades yet.</div>`;
  const myId = state.session.user.id;
  return ui.trades.map(t=>{
    const isInitiator = t.initiator_id===myId;
    const otherName = esc((t.otherProfile&&t.otherProfile.display_name)||"Player");
    const label = t.status==="pending" ? (isInitiator?`Waiting on ${otherName}`:`Offer from ${otherName}`)
      : t.status==="completed" ? `Completed with ${otherName}` : t.status==="declined" ? `Declined by ${otherName}` : "Cancelled";
    const color = t.status==="pending" ? COLORS.gold : t.status==="completed" ? COLORS.turf : COLORS.muted;
    return `
      <div class="panel" style="padding:14px;margin-bottom:10px">
        <div class="row between">
          <span style="font-size:12px;font-weight:800;color:${color}">${label}</span>

        </div>
      </div>

  }).join("");
}

// ---------- Profile view ----------
function profileView(){
  const owned = state.players.filter(p=>p.owned);
  const bestCard = owned.reduce((best,p)=> p.power>(best?best.power:0) ? p : best, null);
  const total = state.stats.wins+state.stats.losses+(state.stats.draws||0);
  const winRate = total ? Math.round((state.stats.wins/total)*100) : 0;
  const rank = rankForWins(state.stats.wins);
  const xp = state.stats.wins*15 + state.stats.losses*3 + owned.length*8 + state.stats.bestStreak*10;
  const level = Math.floor(xp/150)+1, xpInto = xp%150, xpPct = Math.round((xpInto/150)*100);
  return `<div class="view">
    <div class="panel" style="padding:20px;margin-bottom:16px;text-align:center;background:linear-gradient(160deg, ${COLORS.panel}, ${COLORS.panelLight})">
      <div class="avatarCircle" style="width:76px;height:76px;font-size:30px;margin:0 auto 8px;position:relative;background:linear-gradient(135deg, ${state.profile.color}, ${COLORS.purple});box-shadow:0 0 20px ${state.profile.color}66">
        ${state.profile.avatar}
        <div style="position:absolute;bottom:-4px;right:-4px;width:24px;height:24px;border-radius:50%;background:${COLORS.bg};border:2px solid ${state.profile.color};color:${state.profile.color};font-weight:900;font-size:10px;display:flex;align-items:center;justify-content:center">${state.profile.number}</div>
      </div>
      <div style="font-size:10px;font-weight:900;letter-spacing:.1em;margin-bottom:2px;color:${rank.color}">${rank.icon} ${rank.name.toUpperCase()}</div>
      ${state.profile.username ? `<div style="font-size:11px;margin-bottom:8px;color:${COLORS.muted}">@${esc(state.profile.username)}</div>` : ""}
      <div class="grid2" style="margin-bottom:10px">
        <input data-field="name" value="${esc(state.profile.name)}" placeholder="Your name" maxlength="16" style="text-align:center;font-weight:800;border-radius:12px;padding:8px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${COLORS.cream}" />
        <input data-field="teamName" value="${esc(state.profile.teamName)}" placeholder="Team name" maxlength="18" style="text-align:center;font-weight:800;border-radius:12px;padding:8px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${COLORS.cream}" />
      </div>
      <div class="row center" style="gap:8px;margin-bottom:10px">
        <span style="font-size:10px;font-weight:800;color:${COLORS.muted}">JERSEY #</span>
        <input data-field="number" type="number" min="1" max="99" value="${state.profile.number}" style="width:52px;text-align:center;font-weight:900;border-radius:12px;padding:4px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${state.profile.color}" />
      </div>
      <div class="row wrap center" style="gap:6px;margin-bottom:10px">
        ${AVATARS.map(a=>`<button data-action="set-avatar" data-avatar="${a}" class="scrimtap" style="font-size:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${a===state.profile.avatar?state.profile.color+"44":"transparent"};border:1px solid ${a===state.profile.avatar?state.profile.color:"transparent"}">${a}</button>`).join("")}
      </div>
      <div class="row center" style="gap:8px">
        ${TEAM_COLORS.map(c=>`<button data-action="set-color" data-color="${c.hex}" class="scrimtap" style="width:22px;height:22px;border-radius:50%;background:${c.hex};border:2px solid ${state.profile.color===c.hex?"#fff":"transparent"}"></button>`).join("")}
      </div>
    </div>

    <div class="panel" style="padding:16px;margin-bottom:16px">
      <div class="row between" style="margin-bottom:8px"><div style="font-size:11px;font-weight:800;letter-spacing:.1em;color:${COLORS.muted}">FAN LEVEL</div><div style="font-weight:900;font-size:13px;color:${state.profile.color}">LV ${level}</div></div>
      <div style="height:10px;border-radius:999px;overflow:hidden;background:${COLORS.panelLight}"><div style="height:100%;border-radius:999px;width:${xpPct}%;background:linear-gradient(90deg, ${state.profile.color}, ${COLORS.gold})"></div></div>
      <div style="font-size:10px;margin-top:4px;color:${COLORS.muted}">${xpInto} / 150 XP to next level</div>
    </div>

    <div class="panel" style="padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.muted}">THIS SEASON</div>
      <div class="row between" style="font-size:13px"><span style="color:${COLORS.cream}">Season ${state.season.number} · Matchday ${state.season.matchday}/6</span><span style="font-weight:900;color:${COLORS.gold}">${state.season.points} pts</span></div>
      <div style="font-size:10px;margin-top:4px;color:${COLORS.muted}">${state.season.wins}W - ${state.season.draws||0}D - ${state.season.losses}L this season</div>

    <div class="grid4" style="margin-bottom:16px">
      ${statBox("Wins",state.stats.wins,COLORS.turf)}${statBox("Losses",state.stats.losses,COLORS.danger)}${statBox("Win rate",winRate+"%",COLORS.gold)}${statBox("Best streak",state.stats.bestStreak,COLORS.pink)}

    <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.muted}">ACHIEVEMENTS</div>

      ${ACHIEVEMENTS.map(a=>{ const unlocked = a.check(state.stats, state.players, {season:state.season, gems:state.gems});
        return `<div class="col center" style="text-align:center;border-radius:12px;padding:8px;background:${unlocked?COLORS.panelLight:COLORS.panel};opacity:${unlocked?1:0.4};border:1px solid ${unlocked?COLORS.gold:"transparent"}">
          <div style="font-size:17px;margin-bottom:2px">${a.emoji}</div>
          <div style="font-size:8px;font-weight:800;line-height:1.2;color:${unlocked?COLORS.cream:COLORS.muted}">${a.label}</div>
        </div>`; }).join("")}
    </div>

    <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.muted}">BEST CARD</div>
    ${bestCard ? playerCard(bestCard,{mode:"index"}) : `<div style="font-size:13px;margin-bottom:16px;color:${COLORS.muted}">No cards yet.</div>`}

    <div class="panel" style="padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.muted}">REDEEM A CODE</div>
      <div class="row" style="gap:8px">
        <input data-field="redeemCode" value="${esc(state.redeemUI.code)}" placeholder="Enter promo code" maxlength="24" style="flex:1;text-transform:uppercase;border-radius:12px;padding:10px;border:none;outline:none;font-size:13px;background:${COLORS.panelLight};color:${COLORS.cream}" />
        <button data-action="redeem-code-submit" class="btn scrimtap" style="padding:10px 16px;font-size:12px;font-weight:800;background:${COLORS.turf};color:${COLORS.bg}">${state.redeemUI.loading?"…":"Redeem"}</button>
      </div>
      ${state.redeemUI.status ? `<div style="font-size:12px;margin-top:8px;color:${state.redeemUI.status.startsWith("Redeemed")?COLORS.turf:COLORS.danger}">${esc(state.redeemUI.status)}</div>` : ""}
    </div>

    ${isAdmin() ? `
    <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin:16px 0 8px;color:${COLORS.gold}">ADMIN SHORTCUTS (your account only)</div>
    <div class="grid3" style="margin-bottom:8px">
      <button data-action="admin-self-gems" data-amount="100" class="btn scrimtap panel" style="padding:10px 0;font-size:12px;color:${COLORS.gold}">+100</button>
      <button data-action="admin-self-gems" data-amount="1000" class="btn scrimtap panel" style="padding:10px 0;font-size:12px;color:${COLORS.gold}">+1,000</button>
      <button data-action="admin-self-gems" data-amount="100000" class="btn scrimtap panel" style="padding:10px 0;font-size:12px;color:${COLORS.gold}">+100k</button>
    </div>
    ` : ""}

    <button data-action="sign-out" class="btn scrimtap wfull" style="margin-top:16px;padding:12px 0;font-size:12px;font-weight:800;background:${COLORS.panel};color:${COLORS.muted}">Sign Out</button>

    <div class="panel" style="padding:16px;margin-top:16px;border:1px solid ${COLORS.danger}66">
      <div style="font-size:11px;font-weight:800;letter-spacing:.1em;margin-bottom:8px;color:${COLORS.danger}">DANGER ZONE</div>
      ${state.deleteAccountUI.status ? `<div style="font-size:12px;margin-bottom:10px;color:${COLORS.danger}">${esc(state.deleteAccountUI.status)}</div>` : ""}
      ${state.deleteAccountUI.confirming ? `
        <div style="font-size:12px;margin-bottom:10px;color:${COLORS.cream}">This permanently deletes your account, cards, gems, matches, friends, and messages. This can't be undone.</div>
        <div class="row" style="gap:8px">
          <button data-action="confirm-delete-account" ${state.deleteAccountUI.loading?"disabled":""} class="btn scrimtap wfull" style="padding:12px 0;font-size:12px;font-weight:800;background:${COLORS.danger};color:#fff">${state.deleteAccountUI.loading?"Deleting…":"Yes, Delete Everything"}</button>
          <button data-action="cancel-delete-account" class="btn scrimtap wfull panel" style="padding:12px 0;font-size:12px;color:${COLORS.cream}">Cancel</button>
        </div>
      ` : `
        <button data-action="arm-delete-account" class="btn scrimtap wfull panel" style="padding:12px 0;font-size:12px;font-weight:800;color:${COLORS.danger}">Delete Account</button>
      `}
    </div>
  </div>`;
}

  return `

function clearMinuteInterval(){ if(state.play.minuteInterval){ clearInterval(state.play.minuteInterval); state.play.minuteInterval=null; } }
function clearBallInterval(){ if(state.play.ballInterval){ clearInterval(state.play.ballInterval); state.play.ballInterval=null; } }
function motionSlotList(){
  const pl = state.play;
  const mySlots = buildSlots(pl.formationKey,"my");
  const oppSlots = pl.oppSlots || [];
  return [
    ...mySlots.map(s=>({key:"my-"+s.id, x:s.x, y:s.y})),
    ...oppSlots.map(s=>({key:"opp-"+s.id, x:s.x, y:s.y})),
  ];
}
function updateBallDOM(prevKey, nextKey){
  if(prevKey){ const el=document.getElementById("chip-"+prevKey); if(el) el.style.transform="scale(1)"; const av=document.getElementById("avatar-"+prevKey); if(av){ av.style.boxShadow=""; av.style.borderColor="rgba(255,255,255,.7)"; } }
  if(nextKey){ const el=document.getElementById("chip-"+nextKey); if(el) el.style.transform="scale(1.22)"; const av=document.getElementById("avatar-"+nextKey); if(av){ av.style.boxShadow=`0 0 14px ${COLORS.gold}cc`; av.style.borderColor=COLORS.gold; } }
  const marker = document.getElementById("ballMarker");
  const list = motionSlotList();
  const slot = list.find(m=>m.key===nextKey);
  if(marker && slot){ marker.style.left=slot.x+"%"; marker.style.top=slot.y+"%"; marker.style.display="block"; }
}
function startBallInterval(){
  const pl = state.play;
  clearBallInterval();
  const motionList = motionSlotList();
  if(!motionList.length) return;
  let current = motionList[Math.floor(Math.random()*motionList.length)].key;
  pl.ballOwnerKey = current;
  updateBallDOM(null, current);
  pl.ballInterval = setInterval(()=>{
    const list = motionSlotList();
    const teamPrefix = current.split("-")[0];
    const stayTeam = Math.random()<0.8;
    const pool = list.filter(m=>m.key!==current && (stayTeam ? m.key.startsWith(teamPrefix) : !m.key.startsWith(teamPrefix)));
    const fallback = list.filter(m=>m.key!==current);
    const choices = pool.length ? pool : fallback;
    if(!choices.length) return;
    const prev = current;
    current = choices[Math.floor(Math.random()*choices.length)].key;
    pl.ballOwnerKey = current;
    updateBallDOM(prev, current);
  }, 850);
}

function beginMatch(newOppSlots, opp, label){
  const pl = state.play;
  ensureAudio(); playWhistle(); setTimeout(playKick,150);

  pl.oppSlots = newOppSlots; pl.oppLineup = opp;
  pl.firstHalfLineup = {...pl.myLineup};
  pl.currentHalf=1; pl.phase="battling"; pl.myGoals=0; pl.oppGoals=0;
  pl.commentary = `Kick off ${label}!`; pl.matchMinute=0; pl.zoneResultsLive={};
  render();
  startBallInterval();

  const t0 = performance.now();
  clearMinuteInterval();
  pl.minuteInterval = setInterval(()=>{
    const elapsed = performance.now()-t0;
    const m = Math.min(45, Math.floor((elapsed/15000)*45));
    pl.matchMinute = Math.min(90, m);
    const el = document.getElementById("matchMinuteText");
    if(el) el.textContent = pl.matchMinute;
  }, 250);

  const reveal = (zoneKey, delay)=> setTimeout(()=>{
    const {result} = computeZone(zoneKey, pl.firstHalfLineup, pl.oppLineup);
    pl.zoneResultsLive = {...pl.zoneResultsLive, [zoneKey]:result};
    pl.commentary = COMMENTARY[zoneKey][result];
    if(result==="win"){ playZoneWin(); pl.myGoals++; } else if(result==="lose"){ playZoneLose(); pl.oppGoals++; } else playTap();
    render();
  }, delay);
  reveal("GK",6000); reveal("DEF",13000);

  setTimeout(()=>{ clearMinuteInterval(); clearBallInterval(); playWhistle(); pl.commentary="⏸️ Half-time — make a substitution if you need one."; pl.phase="halftime"; render(); }, 15000);
}
function kickOff(){
  const pl = state.play;
  saveSquadRemote();
  const usedIds = Object.values(pl.myLineup).filter(Boolean).map(p=>p.id);
  const formationKeys = Object.keys(FORMATIONS);
  const chosenOppFormation = formationKeys[Math.floor(Math.random()*formationKeys.length)];
  const newOppSlots = buildSlots(chosenOppFormation,"opp");
  const toughness = Math.min(state.stats.streak + (state.season.number-1), 8);
  const opp = {};
  newOppSlots.forEach(slot=>{
    const pool = state.players.filter(p=>p.position===slot.position && !usedIds.includes(p.id));
    let source = pool.length ? pool : state.players.filter(p=>p.position===slot.position);
    if(toughness>=2){ const sorted=[...source].sort((a,b)=>b.power-a.power); source = sorted.slice(0, Math.max(1, Math.ceil(sorted.length*(1-toughness*0.06)))); }
    opp[slot.id] = source[Math.floor(Math.random()*source.length)];
  });
  pl.opponentMeta = null; pl.isChallengeMatch = false;
  beginMatch(newOppSlots, opp, `vs ${currentClub()}`);
}
// Phase D: real challenge acceptance. Called from lib/social.js once
// resolveChallengeAccept() has already written the authoritative result to
// the challenges row -- this just drives the SAME local beginMatch() ticker
// AI matches use, with the challenger's real lineup as the opponent.
// computeZone() re-derives the same result live since it's a pure function
// of the two already-fixed lineups, so there's no risk of the live reveal
// disagreeing with what was just written to the DB.
function beginChallengeMatch(challengeRow, challengerLineup){
  const pl = state.play;
  const friend = state.friendsUI.friends.find(f=>f.id===challengeRow.challenger_id);
  const newOppSlots = buildSlots(challengeRow.challenger_formation,"opp");
  const opp = {};

  pl.opponentMeta = { teamName: (friend&&friend.team_name)||"Rival Squad", profileName: (friend&&friend.display_name)||"Friend", avatar: (friend&&friend.avatar)||"⚔️", color: COLORS.pink };
  pl.isChallengeMatch = true;
  state.tab = "play";
  render();
  beginMatch(newOppSlots, opp, `vs ${esc((friend&&friend.display_name)||"a friend")}'s squad`);
}
window.beginChallengeMatch = beginChallengeMatch;
function continueSecondHalf(){
  const pl = state.play;
  const secondHalfLineup = {...pl.myLineup};
  playWhistle(); pl.currentHalf=2; pl.phase="battling"; pl.commentary="Second half underway!"; render();
  startBallInterval();

  const t0 = performance.now();
  clearMinuteInterval();
  pl.minuteInterval = setInterval(()=>{
    const elapsed = performance.now()-t0;
    const m = Math.min(45, Math.floor((elapsed/15000)*45));
    pl.matchMinute = Math.min(90, 45+m);
    const el = document.getElementById("matchMinuteText");
    if(el) el.textContent = pl.matchMinute;
  }, 250);

  const reveal = (zoneKey, delay)=> setTimeout(()=>{
    const {result} = computeZone(zoneKey, secondHalfLineup, pl.oppLineup);
    pl.zoneResultsLive = {...pl.zoneResultsLive, [zoneKey]:result};
    pl.commentary = COMMENTARY[zoneKey][result];
    if(result==="win"){ playZoneWin(); pl.myGoals++; } else if(result==="lose"){ playZoneLose(); pl.oppGoals++; } else playTap();
    render();
  }, delay);
  reveal("MID",6000); reveal("FWD",13000);

  setTimeout(()=>{
    clearMinuteInterval();
    clearBallInterval();
    const zGK = computeZone("GK", pl.firstHalfLineup, pl.oppLineup);
    const zDEF = computeZone("DEF", pl.firstHalfLineup, pl.oppLineup);
    const zMID = computeZone("MID", secondHalfLineup, pl.oppLineup);
    const zFWD = computeZone("FWD", secondHalfLineup, pl.oppLineup);
    const zr = {GK:zGK.result,DEF:zDEF.result,MID:zMID.result,FWD:zFWD.result};
    let myWins=0, oppWins=0;
    [zGK,zDEF,zMID,zFWD].forEach(z=>{ if(z.result==="win") myWins++; else if(z.result==="lose") oppWins++; });
    const myTotalPower = zGK.myTotal+zDEF.myTotal+zMID.myTotal+zFWD.myTotal;
    const oppTotalPower = zGK.oppTotal+zDEF.oppTotal+zMID.oppTotal+zFWD.oppTotal;
    const outcome = myWins!==oppWins
      ? (myWins>oppWins ? "win" : "loss")
      : (myTotalPower===oppTotalPower ? "draw" : (myTotalPower>oppTotalPower ? "win" : "loss"));
    const won = outcome==="win";
    const isDraw = outcome==="draw";
    const gemsEarned = won ? WIN_GEMS : isDraw ? DRAW_GEMS : LOSS_GEMS;
    // Captured before any season-rollover reassignment below -- a match must
    // be recorded under the season/matchday it was actually played in.
    const matchSeasonNumber = state.season.number, matchMatchday = state.season.matchday;
    const opponentName = pl.opponentMeta ? pl.opponentMeta.teamName : currentClub();

    const ns = won ? state.stats.streak+1 : 0;
    state.stats = { wins: state.stats.wins+(won?1:0), losses: state.stats.losses+(!won&&!isDraw?1:0), draws: (state.stats.draws||0)+(isDraw?1:0), streak: ns, bestStreak: Math.max(state.stats.bestStreak, ns) };
    state.gems += gemsEarned;

    if(!pl.isChallengeMatch){
      const s = state.season;
      const pts = s.points+(won?3:isDraw?1:0), w = s.wins+(won?1:0), l = s.losses+(!won&&!isDraw?1:0), d = (s.draws||0)+(isDraw?1:0);
      if(s.matchday>=6){
        const bonus = pts*2; state.gems += bonus;
        pl.seasonSummary = {number:s.number, points:pts, wins:w, losses:l, draws:d, bonus};
        state.season = {number:s.number+1, matchday:1, points:0, wins:0, losses:0, draws:0};
      } else {
        state.season = {...s, matchday:s.matchday+1, points:pts, wins:w, losses:l, draws:d};
      }
    }
    won ? playWin() : isDraw ? playChime() : playLose();
    pl.commentary = won ? "FULL TIME — What a performance! 🏆" : isDraw ? "FULL TIME — honours even." : "FULL TIME — tough result today.";
    pl.matchMinute = 90;
    pl.finalResult = { won, isDraw, zoneResults:zr, myZoneWins:myWins, oppZoneWins:oppWins, gemsEarned, line: won ? WIN_LINES[Math.floor(Math.random()*WIN_LINES.length)] : isDraw ? DRAW_LINES[Math.floor(Math.random()*DRAW_LINES.length)] : LOSS_LINES[Math.floor(Math.random()*LOSS_LINES.length)] };
    pl.phase = "result";
    state.confettiOn = won;
    checkRankUp();
    render();
    commitMatchResult({result:outcome, myWins, myTotalPower, oppTotalPower, gemsEarned}, matchSeasonNumber, matchMatchday, opponentName, pl.isChallengeMatch);
  }, 15000);
}

document.getElementById("stage").addEventListener("click", function(e){
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.dataset.action;
  if(action==="noop") return;
  ensureAudio();
  const pl = state.play;
  switch(action){
    case "nav-tab":
      state.tab = el.dataset.tab; playTap();
      if(state.tab==="friends"){ refreshFriendsList(); refreshFriendRequests(); refreshChallenges(); refreshTrades(); }
      if(state.tab==="admin" && isAdmin() && !state.adminUI.cardsLoaded){ refreshAdminCards(); }
      render(); break;
    case "open-slot-picker": {
      const slot = buildSlots(pl.formationKey,"my").find(s=>s.id===el.dataset.slotId);
      pl.activeSlot = slot; render(); break;
    }
    case "close-modal":
      if(el.dataset.modal==="active") pl.activeSlot=null; else if(el.dataset.modal==="sub") pl.subSlot=null; else if(el.dataset.modal==="news") state.newsOpen=false;
      render(); break;
    case "open-news":
      state.newsOpen = true; render(); break;
    case "claim-daily": {
      const dailyClaimed = state.home.dailyLastClaim === todayStr();
      if(dailyClaimed) break;
      playChime();
      const reward = DAILY_REWARDS[state.home.dailyStreak % 7];
      state.gems += reward;
      state.home = { ...state.home, dailyLastClaim: todayStr(), dailyStreak: state.home.dailyStreak+1 };
      render();
      updateProfile({ gems: state.gems, daily_last_claim: state.home.dailyLastClaim, daily_streak: state.home.dailyStreak });
      break;
    }
    case "claim-objective": {
      const id = el.dataset.objId, reward = Number(el.dataset.reward);
      if(state.home.objectivesClaimed.includes(id)) break;
      playSparkle();
      state.gems += reward;
      state.home = { ...state.home, objectivesClaimed: [...state.home.objectivesClaimed, id] };
      render();
      updateProfile({ gems: state.gems, objectives_claimed: state.home.objectivesClaimed });
      break;
    }
    case "assign-player": {
      const p = state.players.find(x=>x.id===Number(el.dataset.playerId));
      if(p && pl.activeSlot){ playTap(); pl.myLineup = {...pl.myLineup, [pl.activeSlot.id]:p}; pl.activeSlot=null; render(); }
      break;
    }
    case "remove-slot": {
      const id = el.dataset.slotId; pl.myLineup = {...pl.myLineup, [id]:null}; pl.activeSlot=null; render(); break;
    }
    case "set-formation":
      pl.formationKey = el.dataset.key; pl.myLineup = {}; playTap(); render(); break;
    case "equip-best": {
      const mySlots = buildSlots(pl.formationKey,"my");
      const owned = state.players.filter(p=>p.owned);
      const usedIds = new Set();
      const newLineup = {};
      mySlots.forEach(slot=>{
        const best = owned.filter(p=>p.position===slot.position && !usedIds.has(p.id)).sort((a,b)=>b.power-a.power)[0];
        if(best){ newLineup[slot.id] = best; usedIds.add(best.id); } else { newLineup[slot.id] = null; }
      });
      pl.myLineup = newLineup;
      playFanfare(); render(); break;
    }
    case "kickoff":
      kickOff(); break;
    case "open-sub": {
      if(pl.halfSubUsed) break;
      const slot = buildSlots(pl.formationKey,"my").find(s=>s.id===el.dataset.slotId);
      pl.subSlot = slot; render(); break;
    }
    case "sub-player": {
      const p = state.players.find(x=>x.id===Number(el.dataset.playerId));
      if(p && pl.subSlot){ playTap(); pl.myLineup = {...pl.myLineup, [pl.subSlot.id]:p}; pl.halfSubUsed=true; pl.subSlot=null; render(); }
      break;
    }
    case "continue-second-half":
      continueSecondHalf(); break;
    case "close-season-summary":
      pl.seasonSummary = null; render(); break;
    case "play-again":
      state.confettiOn=false;
      state.play = {...pl, activeSlot:null, subSlot:null, phase:"building", oppLineup:null, oppSlots:[], finalResult:null, matchMinute:0, halfSubUsed:false, zoneResultsLive:{}, seasonSummary:pl.seasonSummary, opponentMeta:null, isChallengeMatch:false};
      render(); break;
    case "friend-send-challenge":
      submitChallengeFriend(el.dataset.targetId); break;
    case "challenge-accept":
      submitAcceptChallenge(Number(el.dataset.challengeId)); break;
    case "challenge-decline":
      submitDeclineChallenge(Number(el.dataset.challengeId)); break;

    case "trade-send":
      submitTradeOffer(); break;
    case "trade-view":
      viewTrade(Number(el.dataset.tradeId)); break;
    case "trade-close-view":
      closeTradeView(); break;
    case "trade-respond": {
      const tradeId = Number(el.dataset.tradeId);
      if(el.dataset.decision==="accept") submitAcceptTrade(tradeId);
      else if(el.dataset.decision==="decline") submitDeclineTrade(tradeId);
      else submitCancelTrade(tradeId);
      break;
    }
    case "admin-section":
      state.adminUI.section = el.dataset.section;
      if(el.dataset.section==="players" && !state.adminUI.allPlayersLoaded) refreshAllPlayers(0);
      if(el.dataset.section==="promos" && !state.adminUI.promoCodesLoaded) refreshPromoCodes();

      state.adminUI.cardForm.rarity = el.dataset.rarity; render(); break;
    case "admin-card-form-save":

      submitPlayerSearch(state.adminUI.playerSearchTerm); break;

      submitProfileInfo(); break;
    case "admin-set-gems-submit":
      submitSetGems(); break;
    case "admin-toggle-ban":
      submitToggleBan(el.dataset.banned==="1"); break;
    case "admin-toggle-admin":
      submitToggleAdmin(el.dataset.isAdmin==="1"); break;
    case "admin-reset-arm":
      armResetProgress(); break;
    case "admin-reset-cancel":
      cancelResetProgress(); break;
    case "admin-reset-confirm":
      submitResetProgress(); break;
    case "admin-promo-new":
      openPromoCodeForm(null); break;
    case "admin-promo-edit-open":
      openPromoCodeForm(el.dataset.code); break;
    case "admin-promo-form-close":
      closePromoCodeForm(); break;
    case "admin-promo-toggle-active":
      state.adminUI.promoCodeForm.active = !state.adminUI.promoCodeForm.active; render(); break;
    case "admin-promo-form-save":
      submitPromoCodeForm(); break;
    case "admin-promo-delete":
      submitDeletePromoCode(el.dataset.code); break;
    case "redeem-code-submit": {
      const ui = state.redeemUI;
      const code = (ui.code || "").trim();
      if(!code || ui.loading) break;
      ui.loading = true; ui.status = ""; render();
      redeemPromoCode(code).then(({ gemsGranted, error })=>{
        ui.loading = false;
        if(error){ ui.status = error; render(); return; }
        playFanfare();
        ui.code = ""; ui.status = `Redeemed! +${gemsGranted} gems.`;
        render();
      });
      break;
    }
    case "open-pack": {
      const pack = PACKS.find(p=>p.id===el.dataset.packId);
      const s = state.shop;
      if(state.gems<pack.cost || s.phase!=="list") break;
      playWhoosh(); state.gems -= pack.cost;
      const locked = state.players.filter(p=>!p.owned && !p.exclusive && p.active!==false);
      const pick = pickWeighted(locked, pack.weights);
      s.selectedPack = pack;
      if(!pick){ state.gems += Math.round(pack.cost/3); playTap(); s.revealed=null; s.phase="revealed"; render(); commitPackRefund(); break; }
      commitPackOpen(pick.id);
      const spinPool = state.players.filter(p=>!p.exclusive && p.active!==false);
      const items = Array.from({length: SPIN_FILLER_COUNT}, ()=> spinPool[Math.floor(Math.random()*spinPool.length)]);
      // Land on the real pick at a randomized position in the strip (not always
      // the very last slot) so the reel doesn't visually stop in the same spot
      // every time -- keep at least 10 cards of spin distance so it never feels
      // like it barely moved.
      const insertAt = Math.floor(Math.random() * (SPIN_FILLER_COUNT - 10 + 1)) + 10;
      items.splice(insertAt, 0, pick);
      s.spinItems = items;
      s.spinFinalIndex = insertAt;
      s.pendingPick = pick;
      s.phase = "spinning";
      render();
      startSpinAnimation();
      break;
    }
    case "close-reveal": {
      const s = state.shop; s.phase="list"; s.revealed=null; s.pendingPick=null; s.selectedPack=null; render(); break;
    }
    case "buy-gem-pass": {
      const pass = GEM_PASSES.find(p=>p.id===el.dataset.passId);
      if(state.shop.purchasePending) break;
      if(isNativeApp()){
        state.shop.purchasePending = pass.id; state.shop.purchaseError = ""; render();
        purchaseProduct(pass.androidId||pass.id).then(({error})=>{
          state.shop.purchasePending = null;
          if(error){ state.shop.purchaseError = error; render(); return; }
          playChime(); state.shop.purchasedPass = pass.id; render();
          refreshGameState();
          setTimeout(()=>{ state.shop.purchasedPass=null; render(); }, 1800);
        });
        break;
      }
      // Web / iOS-PWA -- redirects to Stripe Checkout; the gems are only
      // ever credited by the stripe-webhook Edge Function after a real
      // payment completes (see handleStripeReturn() in lib/iap.js).
      state.shop.purchasePending = pass.id; state.shop.purchaseError = ""; render();
      startWebCheckout(pass.id).then(({error})=>{
        if(error){ state.shop.purchasePending = null; state.shop.purchaseError = error; render(); }
        // On success the page is already navigating away to Stripe.
      });
      break;
    }
    case "buy-exclusive": {
      const card = state.players.find(p=>p.id===Number(el.dataset.cardId));
      if(card.owned || state.shop.purchasePending) break;
      if(isNativeApp()){
        const productId = "exclusive_"+card.id;
        state.shop.purchasePending = productId; state.shop.purchaseError = ""; render();
        purchaseProduct(productId).then(({error})=>{
          state.shop.purchasePending = null;
          if(error){ state.shop.purchaseError = error; render(); return; }
          playFanfare(); state.players = state.players.map(p=> p.id===card.id ? {...p, owned:true} : p);
          state.shop.purchasedExclusive = card.id; render();
          refreshGameState();
        });
        break;
      }
      // Web / iOS-PWA -- redirects to Stripe Checkout; the card is only
      // ever granted by the stripe-webhook Edge Function after a real
      // payment completes (see handleStripeReturn() in lib/iap.js).
      state.shop.purchasePending = productId; state.shop.purchaseError = ""; render();
      startWebCheckout(productId).then(({error})=>{
        if(error){ state.shop.purchasePending = null; state.shop.purchaseError = error; render(); }
        // On success the page is already navigating away to Stripe.
      });
      break;
    }
    case "set-avatar":
      playTap(); state.profile.avatar = el.dataset.avatar; render(); updateProfile({avatar: el.dataset.avatar}); break;
    case "set-color":
      playTap(); state.profile.color = el.dataset.color; saveLocalTeamColor(el.dataset.color); render(); break;
    case "auth-tab":
      state.authUI = { mode: el.dataset.mode, email:"", password:"", confirmPassword:"", username:"", fullName:"", error:"", loading:false, checkEmail:false };
      render(); break;
    case "auth-submit": {
      const ui = state.authUI;
      if(ui.loading) break;
      if(ui.mode==="reset"){ if(!ui.email){ ui.error = "Enter your email."; render(); break; } }
      else if(!ui.email || !ui.password){ ui.error = "Enter an email and password."; render(); break; }
      if(ui.mode==="signup" && ui.password !== ui.confirmPassword){ ui.error = "Passwords don't match."; render(); break; }
      if(ui.mode==="signup" && !/^[a-zA-Z0-9_]{3,20}$/.test(ui.username.trim())){ ui.error = "Username must be 3-20 characters: letters, numbers, underscore only."; render(); break; }
      if(ui.mode==="signup" && !ui.fullName.trim()){ ui.error = "Enter your full name."; render(); break; }
      ui.loading = true; ui.error = ""; render();
      if(ui.mode==="signin"){
        authSignIn(ui.email, ui.password).then(({error})=>{
          ui.loading = false;
          if(error){ ui.error = error; render(); }
        });
      } else if(ui.mode==="signup"){
        stashPendingSignupProfile(ui.username.trim(), ui.fullName.trim());
        authSignUp(ui.email, ui.password).then(({data, error})=>{
          ui.loading = false;
          if(error){ ui.error = error; render(); return; }
          if(!(data && data.session)){ ui.checkEmail = true; render(); }
        });
      } else if(ui.mode==="reset"){
        authSendPasswordReset(ui.email).then(({error})=>{
          ui.loading = false;
          if(error){ ui.error = error; } else { ui.checkEmail = true; }
          render();
        });
      }
      break;
    }
    case "update-password-submit": {
      const ui = state.authUI;
      if(ui.loading) break;
      if(!ui.password || ui.password.length < 6){ ui.error = "Password must be at least 6 characters."; render(); break; }
      if(ui.password !== ui.confirmPassword){ ui.error = "Passwords don't match."; render(); break; }
      ui.loading = true; ui.error = ""; render();
      authChangePassword(ui.password).then(({error})=>{
        ui.loading = false;
        if(error){ ui.error = error; render(); return; }
        state.passwordRecovery = false;
        state.authUI = { mode:"signin", email:"", password:"", confirmPassword:"", username:"", fullName:"", error:"", loading:false, checkEmail:false };
        handleSignedIn(state.session.user.id);
      });
      break;
    }
    case "sign-out":
      authSignOut(); break;
    case "install-app": {
      if(!deferredInstallPrompt) break;
      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      promptEvent.prompt();
      promptEvent.userChoice.then(()=>render());
      render();
      break;
    }
    case "dismiss-install-banner":
      dismissInstallBanner(); render(); break;
    case "arm-delete-account":
      state.deleteAccountUI = { confirming: true, status: "", loading: false }; render(); break;
    case "cancel-delete-account":
      state.deleteAccountUI = { confirming: false, status: "", loading: false }; render(); break;
    case "confirm-delete-account": {
      state.deleteAccountUI.loading = true; render();
      authDeleteAccount().then(({ error }) => {
        if (error) { state.deleteAccountUI = { confirming: true, status: error, loading: false }; render(); return; }
        state.deleteAccountUI = { confirming: false, status: "", loading: false };
      });
      break;
    }
    case "admin-self-gems": {
      if(!isAdmin()) break;
      const amount = Number(el.dataset.amount)||0;
      state.gems += amount; playChime(); render();
      updateProfile({ gems: state.gems });
      break;
    }
    case "acknowledge-ban":
      state.justBanned = false; render(); break;
    case "friends-subtab":
      state.friendsUI.subTab = el.dataset.subtab; render(); break;
    case "friend-search-submit":
      submitFriendSearch(state.friendsUI.searchTerm); break;
    case "friend-send-request":
      submitFriendRequest(el.dataset.targetId); break;
    case "friend-request-respond":
      submitFriendRequestResponse(Number(el.dataset.requestId), el.dataset.accept==="1"); break;
    case "friend-open-chat":
      openChat(el.dataset.friendId, el.dataset.friendName); break;
    case "chat-send":
      sendChatMessage(); break;
    case "chat-close":
      closeChat(); break;
  }
});
function handleFieldInput(e){
  const field = e.target.dataset.field;
  if(!field) return;
  if(field==="authEmail"){ state.authUI.email = e.target.value; state.authUI.error=""; return; }
  if(field==="authPassword"){ state.authUI.password = e.target.value; state.authUI.error=""; return; }
  if(field==="authConfirmPassword"){ state.authUI.confirmPassword = e.target.value; state.authUI.error=""; return; }
  if(field==="authUsername"){ state.authUI.username = e.target.value; state.authUI.error=""; return; }
  if(field==="authFullName"){ state.authUI.fullName = e.target.value; state.authUI.error=""; return; }
  if(field==="friendSearch"){ state.friendsUI.searchTerm = e.target.value; return; }
  if(field==="chatDraft"){ state.friendsUI.chat.draft = e.target.value; return; }
  if(field==="tradeGems"){ state.friendsUI.trade.gems = Math.max(0, Number(e.target.value)||0); return; }
  if(field==="adminCardName"){ state.adminUI.cardForm.name = e.target.value; return; }
  if(field==="adminCardPower"){ state.adminUI.cardForm.power = e.target.value; return; }
  if(field==="adminPlayerSearch"){ state.adminUI.playerSearchTerm = e.target.value; return; }
  if(field==="adminGemsInput"){ state.adminUI.gemsInput = e.target.value; return; }
  if(field==="adminEditDisplayName"){ state.adminUI.editDisplayName = e.target.value; return; }
  if(field==="adminEditTeamName"){ state.adminUI.editTeamName = e.target.value; return; }
  if(field==="adminPromoCode"){ state.adminUI.promoCodeForm.code = e.target.value; return; }
  if(field==="adminPromoGems"){ state.adminUI.promoCodeForm.gems = e.target.value; return; }
  if(field==="adminPromoMaxRedemptions"){ state.adminUI.promoCodeForm.maxRedemptions = e.target.value; return; }
  if(field==="adminPromoExpiresAt"){ state.adminUI.promoCodeForm.expiresAt = e.target.value; return; }
  if(field==="redeemCode"){ state.redeemUI.code = e.target.value; state.redeemUI.status=""; return; }
  if(field==="number"){ state.profile.number = Math.max(1, Math.min(99, Number(e.target.value)||1)); }
  else { state.profile[field] = e.target.value; }
  scheduleProfileSave();
}
document.getElementById("stage").addEventListener("input", handleFieldInput);
document.getElementById("stage").addEventListener("change", handleFieldInput);

render();
initAuthListener();
initIAP(); // no-op on plain web / until REVENUECAT_API_KEY is set -- see lib/iap.js
})();
</script>
