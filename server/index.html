:root{
  --bg:#080F1A;--bg2:#0D1826;--panel:#132234;--panelLight:#1C3348;
  --turf:#2FD180;--pitch:#0F2A1C;--pitchLine:#2E6B47;--pitchLine2:#14351f;--gold:#FFB020;
  --pink:#E14F8A;--cyan:#2FB6D9;--purple:#8B7FE8;--cream:#F3F6FA;--muted:#6C84A3;--danger:#FB5A5A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior-y:contain}
body{background:var(--bg);color:var(--cream);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0}
#stage{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);position:relative;overflow-x:hidden;
  background-image:radial-gradient(circle at 12% 0%, #FFB0201f, transparent 38%), radial-gradient(circle at 88% 4%, #2FB6D91a, transparent 40%);}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
input,textarea{font-family:inherit;font-size:16px}
.display{font-family:'Teko',system-ui,sans-serif;font-weight:700;letter-spacing:0.02em}
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.between{justify-content:space-between}
.center{justify-content:center}
.wrap{flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wfull{width:100%}
.muted{color:var(--muted)}
.panel{background:var(--panel);border:1px solid var(--panelLight);border-radius:16px}
.btn{border:none;border-radius:12px;font-weight:800}
.scrimtap{transition:transform .12s ease}
.scrimtap:active{transform:scale(0.95)}
.tabbar{position:sticky;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--panelLight);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;background:transparent}
.hdr{padding:calc(18px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--panelLight);position:sticky;top:0;background:var(--bg);z-index:15}
.pill{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:12px;background:var(--panel)}
.view{padding:14px 16px calc(100px + env(safe-area-inset-bottom))}
.cardTile{position:relative;border-radius:16px;padding:12px 12px 12px 16px;text-align:left;width:100%;background:var(--panel);border-top:1px solid var(--panelLight);border-right:1px solid var(--panelLight);border-bottom:1px solid var(--panelLight);}
.badge{font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 8px;border-radius:999px}
.avatarCircle{display:flex;align-items:center;justify-content:center;border-radius:999px}
.modalWrap{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6)}
.modalSheet{width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:16px calc(16px) calc(16px + env(safe-area-inset-bottom));max-height:72vh;max-height:72dvh;overflow-y:auto;background:var(--panel)}
.overlayFull{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px}
@keyframes confettiFall{to{transform:translateY(105vh) rotate(360deg);opacity:.4}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04);opacity:1}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes floatBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
@keyframes spinRays{to{transform:rotate(360deg)}}
@keyframes shineSweep{0%{transform:translateX(-150%)}60%{transform:translateX(150%)}100%{transform:translateX(150%)}}
@keyframes riseIn{0%{transform:translateY(120px) scale(.55);opacity:0}70%{transform:translateY(-10px) scale(1.05);opacity:1}100%{transform:translateY(0) scale(1)}}

function pickWeighted(lockedPool, weights){
  const buckets = RARITY_ORDER.map(r=>({r,pool:lockedPool.filter(p=>p.rarity===r),w:weights[r]||0})).filter(b=>b.pool.length>0 && b.w>0);
  if(!buckets.length){ return lockedPool.length ? lockedPool[Math.floor(Math.random()*lockedPool.length)] : null; }
  const totalW = buckets.reduce((s,b)=>s+b.w,0);
  let roll = Math.random()*totalW;
  for(const b of buckets){ if(roll<b.w) return b.pool[Math.floor(Math.random()*b.pool.length)]; roll -= b.w; }
  return buckets[buckets.length-1].pool[Math.floor(Math.random()*buckets[buckets.length-1].pool.length)];
}

function buildSlots(formationKey, side){
  const counts = FORMATIONS[formationKey].counts;
  const yMap = side==="my" ? MY_Y : OPP_Y;
  const slots = [];
  ["GK","DEF","MID","FWD"].forEach(pos=>{
    const n = counts[pos];
    const xs = ROW_XS[n] || [50];
    xs.forEach((x,i)=>slots.push({id:pos+(n>1?i+1:""),position:pos,label:pos,x,y:yMap[pos]}));
  });
  return slots;
}
function zoneOf(id){ return id.replace(/\d+$/,""); }
function computeZone(zoneKey, myLU, oppLU){
  const myTotal = Object.entries(myLU).reduce((s,[id,p])=>s+(zoneOf(id)===zoneKey&&p?p.power:0),0);
  const oppTotal = Object.entries(oppLU).reduce((s,[id,p])=>s+(zoneOf(id)===zoneKey&&p?p.power:0),0);
  const result = myTotal>oppTotal?"win":myTotal<oppTotal?"lose":"tie";
  return {myTotal,oppTotal,result};
}

function b64decode(str){ const pad = str.length%4===0 ? "" : "=".repeat(4-(str.length%4)); const b64 = str.replace(/-/g,"+").replace(/_/g,"/")+pad; return decodeURIComponent(escape(atob(b64))); }
function encodeChallenge(formationKey, lineup, profile){
  const pl = Object.values(lineup).filter(Boolean).map(p=>[p.name, p.position, p.power, RARITY_CODE[p.rarity]||"C"]);
  const payload = {v:1, f:formationKey, tn:profile.teamName||"My Team", pn:profile.name||"Player", av:profile.avatar, cl:profile.color, pl};
  return "LXI1-"+b64encode(JSON.stringify(payload));

function decodeChallenge(code){
  try{
    const raw = String(code).trim().replace(/^LXI1-/,"");
    const payload = JSON.parse(b64decode(raw));
    if(!payload || payload.v!==1 || !Array.isArray(payload.pl) || !payload.pl.length || !FORMATIONS[payload.f]) return null;
    return payload;
  }catch(e){ return null; }
}

let actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx && actx.state==="suspended") actx.resume(); }
function tone(freq,dur,type,vol,delay){
  if(!actx) return; type=type||"sine"; vol=vol||0.15; delay=delay||0;
  const t0=actx.currentTime+delay, osc=actx.createOscillator(), gain=actx.createGain();
  osc.type=type; osc.frequency.value=freq;
  gain.gain.setValueAtTime(vol,t0); gain.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  osc.connect(gain); gain.connect(actx.destination); osc.start(t0); osc.stop(t0+dur+0.02);
}
function noiseBurst(dur,vol,delay){
  if(!actx) return; vol=vol||0.1; delay=delay||0;
  const t0=actx.currentTime+delay, len=Math.max(1,Math.floor(actx.sampleRate*dur));
  const buffer=actx.createBuffer(1,len,actx.sampleRate), data=buffer.getChannelData(0);
  for(let i=0;i<len;i++) data[i]=Math.random()*2-1;
  const src=actx.createBufferSource(); src.buffer=buffer;
  const gain=actx.createGain(); gain.gain.setValueAtTime(vol,t0); gain.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  src.connect(gain); gain.connect(actx.destination); src.start(t0);
}

// Admin panel is gated on hostname, not a password: it only ever renders when the
// page is loaded via the local server directly (localhost/127.0.0.1) -- i.e. only
// on this machine, via the desktop shortcut or http://localhost:8080. Anyone playing
// through the public tunnel URL or on their own phone loads a different hostname
// and never sees it, regardless of save data.
function isAdminDevice(){
  try{ return location.hostname==="localhost" || location.hostname==="127.0.0.1"; }catch(e){ return false; }
}
// Global player-roster management. Talks to admin-server.ps1, a SEPARATE local-only
// server (different port, never tunneled) -- see admin-server.ps1's header comment
// for why that's what actually makes this safe against friends on the public link.
const ADMIN_API = "http://localhost:8081";
function adminPlayersStatus(msg, ok){ state.adminPlayers.status = msg; state.adminPlayers.statusOk = ok; render(); }
function adminRefreshPlayers(){
  state.adminPlayers.listLoading = true; render();
  fetch(ADMIN_API+"/players", {cache:"no-store"}).then(r=>r.json()).then(list=>{
    state.adminPlayers.list = list; state.adminPlayers.listLoading = false; render();
  }).catch(()=>{
    state.adminPlayers.listLoading = false;
    adminPlayersStatus("Could not reach the local admin server — is admin-server.ps1 running?", false);
  });
}
function adminAddPlayer(){
  const f = state.adminPlayers.form;
  const name = (f.name||"").trim();
  const power = Math.max(1, Math.min(100, Number(f.power)||1));
  if(!name){ adminPlayersStatus("Enter a player name first.", false); return; }
  fetch(ADMIN_API+"/players", {cache:"no-store"}).then(r=>r.json()).then(list=>{
    const nextId = list.reduce((m,p)=>Math.max(m,p.id),0) + 1;
    const updated = [...list, {id:nextId, name, position:f.position, power, rarity:f.rarity, owned:false}];
    return fetch(ADMIN_API+"/players", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(updated)})
      .then(r=>r.json()).then(res=>{
        if(res.ok){
          adminPlayersStatus(`Added ${name} (${f.rarity}) — now live for everyone.`, true);
          state.adminPlayers.form = {name:"", position:"FWD", power:80, rarity:"Common"};
          adminRefreshPlayers();
        } else { adminPlayersStatus("Server rejected the player data.", false); }
      });
  }).catch(()=>{ adminPlayersStatus("Could not reach the local admin server — is admin-server.ps1 running?", false); });
}
function adminDeletePlayer(id){
  fetch(ADMIN_API+"/players", {cache:"no-store"}).then(r=>r.json()).then(list=>{
    const updated = list.filter(p=>p.id!==id);
    return fetch(ADMIN_API+"/players", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(updated)})
      .then(r=>r.json()).then(res=>{
        if(res.ok){ adminPlayersStatus("Player removed from the global catalog.", true); adminRefreshPlayers(); }
        else { adminPlayersStatus("Server rejected the update.", false); }
      });
  }).catch(()=>{ adminPlayersStatus("Could not reach the local admin server — is admin-server.ps1 running?", false); });
}

function startSpinAnimation(){
  const s = state.shop;
  const wrap = document.getElementById("spinStrip");
  const track = document.getElementById("spinTrack");
  if(!wrap || !track) return;
  const tickTimes = [90,180,280,390,510,650,800,970,1160,1380,1630,1920,2260,2650];
  tickTimes.forEach((t)=>setTimeout(()=>playTap(), t));
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const width = wrap.offsetWidth;
      const target = width/2 - SPIN_ITEM_W/2 - s.spinFinalIndex*SPIN_STEP;
      track.style.transition = "transform 2.9s cubic-bezier(0.1,0.7,0.15,1)";
      track.style.transform = `translateX(${target}px)`;
    });
  });
  const onEnd = (e)=>{
    if(e.propertyName !== "transform") return;
    track.removeEventListener("transitionend", onEnd);
    landPack();
  };
  track.addEventListener("transitionend", onEnd);
}
function landPack(){
  const s = state.shop;
  const pick = s.pendingPick;
  if(!pick){ return; }
  state.players = state.players.map(p=> p.id===pick.id ? {...p, owned:true} : p);
  if(isTopTier(pick.rarity)){ playFanfare(); playImpact(); } else if(isHighTier(pick.rarity)) playSparkle(); else playChime();
  s.revealed = pick; s.phase="revealed"; s.pendingPick=null;
  render();
}

function pitchHTML(){
  const pl = state.play;
  const showMy = pl.phase!=="__never";
  const mySlots = buildSlots(pl.formationKey,"my");
  const showOpp = pl.phase!=="building";
  const zr = pl.phase==="result" ? (pl.finalResult && pl.finalResult.zoneResults) : (pl.phase==="halftime"||pl.phase==="battling") ? pl.zoneResultsLive : null;
  const bands = {FWD:[0,25],MID:[25,50],DEF:[50,75],GK:[75,100]};
  const zoneShade = zr ? Object.keys(bands).map(z=>{
    const [top,bottom]=bands[z]; const r=zr[z];
    return `<div style="position:absolute;left:0;right:0;top:${top}%;height:${bottom-top}%;background:${r==="win"?COLORS.turf+"22":r==="lose"?COLORS.danger+"22":"transparent"}"></div>`;
  }).join("") : "";
  const WANDER_KF = ["wanderA","wanderB","wanderC","wanderD"];
  function chip(p, isMy, key, i){
    const hasBall = pl.phase==="battling" && key && pl.ballOwnerKey===key;
    if(!p) return `<div class="avatarCircle" style="width:40px;height:40px;border:2px dashed ${COLORS.muted};color:${COLORS.muted};font-weight:900">+</div>`;
    const rarity = RARITY[p.rarity];
    const avatar = `<div id="${key?"avatar-"+key:""}" class="avatarCircle" style="width:40px;height:40px;font-weight:900;font-size:14px;background:${rarity.color};color:${COLORS.bg};border:2px solid ${hasBall?COLORS.gold:"rgba(255,255,255,.7)"};box-shadow:${hasBall?`0 0 14px ${COLORS.gold}cc`:`0 0 12px ${rarity.color}66`};transition:box-shadow .3s ease,border-color .3s ease">${p.power}</div>`;
    const nameTag = `<div style="font-size:9px;font-weight:800;margin-top:2px;padding:0 4px;border-radius:4px;color:${COLORS.cream};background:rgba(0,0,0,.5)">${esc(p.name.split(" ").slice(-1)[0])}</div>`;
    const inner = `<div class="col" style="align-items:center">${avatar}${nameTag}</div>`;
    if(pl.phase!=="battling" || !key) return inner;
    const kf = WANDER_KF[i%4], dur=(2.8+(i%4)*0.4).toFixed(1), delay=((i%5)*0.2).toFixed(1);
    return `<div style="animation:${kf} ${dur}s ease-in-out infinite;animation-delay:${delay}s"><div id="chip-${key}" style="transform:scale(${hasBall?1.22:1});transition:transform .3s ease">${inner}</div></div>`;
  }
  const oppSlots = pl.oppSlots || [];
  const battling = pl.phase==="battling";
  const ballList = battling ? motionSlotList() : [];
  const ballSlot = ballList.find(m=>m.key===pl.ballOwnerKey);
  return `<div style="position:relative;border-radius:16px;overflow:hidden;margin-bottom:16px;height:340px;background:repeating-linear-gradient(180deg, ${COLORS.pitch} 0px, ${COLORS.pitch} 34px, #14351f 34px, #14351f 68px);box-shadow:inset 0 0 60px rgba(0,0,0,.45)">
    <div style="position:absolute;left:0;right:0;top:50%;height:1px;background:${COLORS.pitchLine}"></div>
    <div style="position:absolute;width:80px;height:80px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid ${COLORS.pitchLine}"></div>
    ${zoneShade}
    ${showOpp ? oppSlots.map((slot,i)=>`<div style="position:absolute;left:${slot.x}%;top:${slot.y}%;transform:translate(-50%,-50%)">${chip((pl.oppLineup||{})[slot.id],false,"opp-"+slot.id,i)}</div>`).join("") : ""}
    ${mySlots.map((slot,i)=>`<button data-action="${pl.phase==="building"?"open-slot-picker":"noop"}" data-slot-id="${slot.id}" style="position:absolute;left:${slot.x}%;top:${slot.y}%;transform:translate(-50%,-50%);background:none;border:none;padding:0" class="scrimtap">${chip(pl.myLineup[slot.id],true,"my-"+slot.id,i)}</button>`).join("")}
    ${battling ? `<div id="ballMarker" style="position:absolute;left:${ballSlot?ballSlot.x:50}%;top:${ballSlot?ballSlot.y:50}%;transform:translate(-50%,-180%);font-size:16px;transition:left .4s ease, top .4s ease;display:${ballSlot?"block":"none"}">⚽</div>` : ""}
    ${pl.phase==="battling" ? `<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:900;letter-spacing:.15em;color:${COLORS.gold};animation:pulseLive 1.2s ease-in-out infinite">● LIVE</div>` : ""}
  </div>`;
}

function confettiHTML(){
  let pieces = "";

    pieces += `<div class="confettiPiece" style="left:${left}%;font-size:${size}px;animation:confettiFall ${dur}s ease-in ${delay}s forwards">${emo[i%emo.length]}</div>`;
  }
  return `<div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:45">${pieces}</div>`;
}

function clearMinuteInterval(){ if(state.play.minuteInterval){ clearInterval(state.play.minuteInterval); state.play.minuteInterval=null; } }
function clearBallInterval(){ if(state.play.ballInterval){ clearInterval(state.play.ballInterval); state.play.ballInterval=null; } }
function motionSlotList(){
  const pl = state.play;
  const mySlots = buildSlots(pl.formationKey,"my");
  const oppSlots = pl.oppSlots || [];
  return [
    ...mySlots.map(s=>({key:"my-"+s.id, x:s.x, y:s.y})),
    ...oppSlots.map(s=>({key:"opp-"+s.id, x:s.x, y:s.y})),
  ];
}
function updateBallDOM(prevKey, nextKey){
  if(prevKey){ const el=document.getElementById("chip-"+prevKey); if(el) el.style.transform="scale(1)"; const av=document.getElementById("avatar-"+prevKey); if(av){ av.style.boxShadow=""; av.style.borderColor="rgba(255,255,255,.7)"; } }
  if(nextKey){ const el=document.getElementById("chip-"+nextKey); if(el) el.style.transform="scale(1.22)"; const av=document.getElementById("avatar-"+nextKey); if(av){ av.style.boxShadow=`0 0 14px ${COLORS.gold}cc`; av.style.borderColor=COLORS.gold; } }
  const marker = document.getElementById("ballMarker");
  const list = motionSlotList();
  const slot = list.find(m=>m.key===nextKey);
  if(marker && slot){ marker.style.left=slot.x+"%"; marker.style.top=slot.y+"%"; marker.style.display="block"; }
}
function startBallInterval(){
  const pl = state.play;
  clearBallInterval();
  const motionList = motionSlotList();
  if(!motionList.length) return;
  let current = motionList[Math.floor(Math.random()*motionList.length)].key;
  pl.ballOwnerKey = current;
  updateBallDOM(null, current);
  pl.ballInterval = setInterval(()=>{
    const list = motionSlotList();
    const teamPrefix = current.split("-")[0];
    const stayTeam = Math.random()<0.8;
    const pool = list.filter(m=>m.key!==current && (stayTeam ? m.key.startsWith(teamPrefix) : !m.key.startsWith(teamPrefix)));
    const fallback = list.filter(m=>m.key!==current);
    const choices = pool.length ? pool : fallback;
    if(!choices.length) return;
    const prev = current;
    current = choices[Math.floor(Math.random()*choices.length)].key;
    pl.ballOwnerKey = current;
    updateBallDOM(prev, current);
  }, 850);
}

function beginMatch(newOppSlots, opp, label){
  const pl = state.play;
  ensureAudio(); playWhistle(); setTimeout(playKick,150);

  pl.oppSlots = newOppSlots; pl.oppLineup = opp;
  pl.firstHalfLineup = {...pl.myLineup};
  pl.currentHalf=1; pl.phase="battling"; pl.myGoals=0; pl.oppGoals=0;
  pl.commentary = `Kick off ${label}!`; pl.matchMinute=0; pl.zoneResultsLive={};
  render();
  startBallInterval();

  const t0 = performance.now();
  clearMinuteInterval();
  pl.minuteInterval = setInterval(()=>{
    const elapsed = performance.now()-t0;
    const m = Math.min(45, Math.floor((elapsed/15000)*45));
    pl.matchMinute = Math.min(90, m);
    const el = document.getElementById("matchMinuteText");
    if(el) el.textContent = pl.matchMinute;
  }, 250);

  const reveal = (zoneKey, delay)=> setTimeout(()=>{
    const {result} = computeZone(zoneKey, pl.firstHalfLineup, pl.oppLineup);
    pl.zoneResultsLive = {...pl.zoneResultsLive, [zoneKey]:result};
    pl.commentary = COMMENTARY[zoneKey][result];
    if(result==="win"){ playZoneWin(); pl.myGoals++; } else if(result==="lose"){ playZoneLose(); pl.oppGoals++; } else playTap();
    render();
  }, delay);
  reveal("GK",6000); reveal("DEF",13000);

  setTimeout(()=>{ clearMinuteInterval(); clearBallInterval(); playWhistle(); pl.commentary="⏸️ Half-time — make a substitution if you need one."; pl.phase="halftime"; render(); }, 15000);
}
function kickOff(){
  const pl = state.play;
  const usedIds = Object.values(pl.myLineup).filter(Boolean).map(p=>p.id);
  const formationKeys = Object.keys(FORMATIONS);
  const chosenOppFormation = formationKeys[Math.floor(Math.random()*formationKeys.length)];
  const newOppSlots = buildSlots(chosenOppFormation,"opp");
  const toughness = Math.min(state.stats.streak + (state.season.number-1), 8);
  const opp = {};
  newOppSlots.forEach(slot=>{
    const pool = state.players.filter(p=>p.position===slot.position && !usedIds.includes(p.id));
    let source = pool.length ? pool : state.players.filter(p=>p.position===slot.position);
    if(toughness>=2){ const sorted=[...source].sort((a,b)=>b.power-a.power); source = sorted.slice(0, Math.max(1, Math.ceil(sorted.length*(1-toughness*0.06)))); }
    opp[slot.id] = source[Math.floor(Math.random()*source.length)];
  });
  pl.opponentMeta = null; pl.isChallengeMatch = false;
  beginMatch(newOppSlots, opp, `vs ${currentClub()}`);
}
function startChallengeMatch(payload){
  const pl = state.play;
  const newOppSlots = buildSlots(payload.f,"opp");
  const byPos = {};
  payload.pl.forEach(([name, position, power, rc], i)=>{
    (byPos[position] = byPos[position] || []).push({ id:`chal-${i}-${position}-${power}`, name, position, power, rarity: RARITY_FROM_CODE[rc]||"Common", owned:true });
  });
  const opp = {};
  newOppSlots.forEach(slot=>{ const pool = byPos[slot.position]||[]; opp[slot.id] = pool.shift() || null; });
  pl.opponentMeta = { teamName: payload.tn, profileName: payload.pn, avatar: payload.av, color: payload.cl };
  pl.isChallengeMatch = true;
  pl.challengeOpen = false;
  beginMatch(newOppSlots, opp, `vs ${payload.pn}'s ${payload.tn}`);
}
function continueSecondHalf(){
  const pl = state.play;
  const secondHalfLineup = {...pl.myLineup};
  playWhistle(); pl.currentHalf=2; pl.phase="battling"; pl.commentary="Second half underway!"; render();
  startBallInterval();

  const t0 = performance.now();
  clearMinuteInterval();
  pl.minuteInterval = setInterval(()=>{
    const elapsed = performance.now()-t0;
    const m = Math.min(45, Math.floor((elapsed/15000)*45));
    pl.matchMinute = Math.min(90, 45+m);
    const el = document.getElementById("matchMinuteText");
    if(el) el.textContent = pl.matchMinute;
  }, 250);

  const reveal = (zoneKey, delay)=> setTimeout(()=>{
    const {result} = computeZone(zoneKey, secondHalfLineup, pl.oppLineup);
    pl.zoneResultsLive = {...pl.zoneResultsLive, [zoneKey]:result};
    pl.commentary = COMMENTARY[zoneKey][result];
    if(result==="win"){ playZoneWin(); pl.myGoals++; } else if(result==="lose"){ playZoneLose(); pl.oppGoals++; } else playTap();
    render();
  }, delay);
  reveal("MID",6000); reveal("FWD",13000);

  setTimeout(()=>{
    clearMinuteInterval();
    clearBallInterval();
    const zGK = computeZone("GK", pl.firstHalfLineup, pl.oppLineup);
    const zDEF = computeZone("DEF", pl.firstHalfLineup, pl.oppLineup);
    const zMID = computeZone("MID", secondHalfLineup, pl.oppLineup);
    const zFWD = computeZone("FWD", secondHalfLineup, pl.oppLineup);
    const zr = {GK:zGK.result,DEF:zDEF.result,MID:zMID.result,FWD:zFWD.result};
    let myWins=0, oppWins=0;
    [zGK,zDEF,zMID,zFWD].forEach(z=>{ if(z.result==="win") myWins++; else if(z.result==="lose") oppWins++; });
    const myTotalPower = zGK.myTotal+zDEF.myTotal+zMID.myTotal+zFWD.myTotal;
    const oppTotalPower = zGK.oppTotal+zDEF.oppTotal+zMID.oppTotal+zFWD.oppTotal;
    const outcome = myWins!==oppWins
      ? (myWins>oppWins ? "win" : "loss")
      : (myTotalPower===oppTotalPower ? "draw" : (myTotalPower>oppTotalPower ? "win" : "loss"));
    const won = outcome==="win";
    const isDraw = outcome==="draw";
    const gemsEarned = won ? WIN_GEMS : isDraw ? DRAW_GEMS : LOSS_GEMS;

    const ns = won ? state.stats.streak+1 : 0;
    state.stats = { wins: state.stats.wins+(won?1:0), losses: state.stats.losses+(!won&&!isDraw?1:0), draws: (state.stats.draws||0)+(isDraw?1:0), streak: ns, bestStreak: Math.max(state.stats.bestStreak, ns) };
    state.gems += gemsEarned;

    if(!pl.isChallengeMatch){
      const s = state.season;
      const pts = s.points+(won?3:isDraw?1:0), w = s.wins+(won?1:0), l = s.losses+(!won&&!isDraw?1:0), d = (s.draws||0)+(isDraw?1:0);
      if(s.matchday>=6){
        const bonus = pts*2; state.gems += bonus;
        pl.seasonSummary = {number:s.number, points:pts, wins:w, losses:l, draws:d, bonus};
        state.season = {number:s.number+1, matchday:1, points:0, wins:0, losses:0, draws:0};
      } else {
        state.season = {...s, matchday:s.matchday+1, points:pts, wins:w, losses:l, draws:d};
      }
    }
    won ? playWin() : isDraw ? playChime() : playLose();
    pl.commentary = won ? "FULL TIME — What a performance! 🏆" : isDraw ? "FULL TIME — honours even." : "FULL TIME — tough result today.";
    pl.matchMinute = 90;
    pl.finalResult = { won, isDraw, zoneResults:zr, myZoneWins:myWins, oppZoneWins:oppWins, gemsEarned, line: won ? WIN_LINES[Math.floor(Math.random()*WIN_LINES.length)] : isDraw ? DRAW_LINES[Math.floor(Math.random()*DRAW_LINES.length)] : LOSS_LINES[Math.floor(Math.random()*LOSS_LINES.length)] };
    pl.phase = "result";
    state.confettiOn = won;
    checkRankUp();
    render();
  }, 15000);
}

document.getElementById("stage").addEventListener("click", function(e){
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.dataset.action;
  if(action==="noop") return;
  ensureAudio();
  const pl = state.play;
  switch(action){
    case "nav-tab":
      state.tab = el.dataset.tab; playTap();
      if(state.tab==="admin" && isAdminDevice() && !state.adminPlayers.list) adminRefreshPlayers();
      render(); break;
    case "open-slot-picker": {
      const slot = buildSlots(pl.formationKey,"my").find(s=>s.id===el.dataset.slotId);
      pl.activeSlot = slot; render(); break;
    }
    case "close-modal":
      if(el.dataset.modal==="active") pl.activeSlot=null; else if(el.dataset.modal==="sub") pl.subSlot=null; else if(el.dataset.modal==="news") state.newsOpen=false; else if(el.dataset.modal==="challenge") pl.challengeOpen=false;
      render(); break;
    case "open-news":
      state.newsOpen = true; render(); break;
    case "claim-daily": {
      const dailyClaimed = state.home.dailyLastClaim === todayStr();
      if(dailyClaimed) break;
      playChime();
      const reward = DAILY_REWARDS[state.home.dailyStreak % 7];
      state.gems += reward;
      state.home = { ...state.home, dailyLastClaim: todayStr(), dailyStreak: state.home.dailyStreak+1 };
      render(); break;
    }
    case "claim-objective": {
      const id = el.dataset.objId, reward = Number(el.dataset.reward);
      if(state.home.objectivesClaimed.includes(id)) break;
      playSparkle();
      state.gems += reward;
      state.home = { ...state.home, objectivesClaimed: [...state.home.objectivesClaimed, id] };
      render(); break;
    }
    case "assign-player": {
      const p = state.players.find(x=>x.id===Number(el.dataset.playerId));
      if(p && pl.activeSlot){ playTap(); pl.myLineup = {...pl.myLineup, [pl.activeSlot.id]:p}; pl.activeSlot=null; render(); }
      break;
    }
    case "remove-slot": {
      const id = el.dataset.slotId; pl.myLineup = {...pl.myLineup, [id]:null}; pl.activeSlot=null; render(); break;
    }
    case "set-formation":
      pl.formationKey = el.dataset.key; pl.myLineup = {}; playTap(); render(); break;
    case "kickoff":
      kickOff(); break;
    case "open-sub": {
      if(pl.halfSubUsed) break;
      const slot = buildSlots(pl.formationKey,"my").find(s=>s.id===el.dataset.slotId);
      pl.subSlot = slot; render(); break;
    }
    case "sub-player": {
      const p = state.players.find(x=>x.id===Number(el.dataset.playerId));
      if(p && pl.subSlot){ playTap(); pl.myLineup = {...pl.myLineup, [pl.subSlot.id]:p}; pl.halfSubUsed=true; pl.subSlot=null; render(); }
      break;
    }
    case "continue-second-half":
      continueSecondHalf(); break;
    case "close-season-summary":
      pl.seasonSummary = null; render(); break;
    case "play-again":
      state.confettiOn=false;
      state.play = {...pl, activeSlot:null, subSlot:null, phase:"building", oppLineup:null, oppSlots:[], finalResult:null, matchMinute:0, halfSubUsed:false, zoneResultsLive:{}, seasonSummary:pl.seasonSummary, opponentMeta:null, isChallengeMatch:false};
      render(); break;
    case "open-challenge":
      pl.challengeOpen = true; pl.challengeTab = "share"; pl.pasteError=""; render(); break;
    case "challenge-tab":
      pl.challengeTab = el.dataset.tab; render(); break;
    case "copy-challenge": {
      const usedIds = Object.values(pl.myLineup).filter(Boolean).map(p=>p.id);
      const mySlots = buildSlots(pl.formationKey,"my");
      const filled = Object.values(pl.myLineup).filter(Boolean).length;
      if(filled !== mySlots.length) break;
      const code = encodeChallenge(pl.formationKey, pl.myLineup, state.profile);
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(code).catch(()=>{}); }
      playTap(); pl.copyFeedback = true; render();
      setTimeout(()=>{ pl.copyFeedback=false; render(); }, 1800);
      break;
    }
    case "join-challenge": {
      const mySlots = buildSlots(pl.formationKey,"my");
      const filled = Object.values(pl.myLineup).filter(Boolean).length;
      if(filled !== mySlots.length){ pl.pasteError = `Fill all ${mySlots.length} of your own positions before battling.`; render(); break; }
      const payload = decodeChallenge(pl.pasteCode);
      if(!payload){ pl.pasteError = "That code doesn't look right — double-check and try again."; render(); break; }
      startChallengeMatch(payload);
      break;
    }
    case "open-pack": {
      const pack = PACKS.find(p=>p.id===el.dataset.packId);
      const s = state.shop;
      if(state.gems<pack.cost || s.phase!=="list") break;
      playWhoosh(); state.gems -= pack.cost;
      const locked = state.players.filter(p=>!p.owned && !p.exclusive);
      const pick = pickWeighted(locked, pack.weights);
      s.selectedPack = pack;
      if(!pick){ state.gems += Math.round(pack.cost/3); playTap(); s.revealed=null; s.phase="revealed"; render(); break; }
      const spinPool = state.players.filter(p=>!p.exclusive);
      const items = Array.from({length: SPIN_FILLER_COUNT}, ()=> spinPool[Math.floor(Math.random()*spinPool.length)]);
      // Land on the real pick at a randomized position in the strip (not always
      // the very last slot) so the reel doesn't visually stop in the same spot
      // every time -- keep at least 10 cards of spin distance so it never feels
      // like it barely moved.
      const insertAt = Math.floor(Math.random() * (SPIN_FILLER_COUNT - 10 + 1)) + 10;
      items.splice(insertAt, 0, pick);
      s.spinItems = items;
      s.spinFinalIndex = insertAt;
      s.pendingPick = pick;
      s.phase = "spinning";
      render();
      startSpinAnimation();
      break;
    }
    case "close-reveal": {
      const s = state.shop; s.phase="list"; s.revealed=null; s.pendingPick=null; s.selectedPack=null; render(); break;
    }
    case "buy-gem-pass": {
      const pass = GEM_PASSES.find(p=>p.id===el.dataset.passId);
      playChime(); state.gems += pass.gems; state.shop.purchasedPass = pass.id; render();
      setTimeout(()=>{ state.shop.purchasedPass=null; render(); }, 1800);
      break;
    }
    case "buy-exclusive": {
      const card = state.players.find(p=>p.id===Number(el.dataset.cardId));
      if(card.owned) break;
      playFanfare(); state.players = state.players.map(p=> p.id===card.id ? {...p, owned:true} : p);
      state.shop.purchasedExclusive = card.id; render(); break;
    }
    case "set-avatar":
      playTap(); state.profile.avatar = el.dataset.avatar; render(); break;
    case "set-color":
      playTap(); state.profile.color = el.dataset.color; render(); break;
    case "confirm-reset":
      state.confirmReset = true; render();
      setTimeout(()=>{ state.confirmReset=false; render(); }, 4000);
      break;
    case "do-reset":
      state.players = JSON.parse(JSON.stringify(STARTER_PLAYERS));
      state.stats = {wins:0,losses:0,draws:0,streak:0,bestStreak:0};
      state.profile = {name:"Player",avatar:"⚽",teamName:"My Team",number:7,color:COLORS.turf};
      state.gems = STARTING_GEMS;
      state.season = {number:1,matchday:1,points:0,wins:0,losses:0,draws:0};
      state.home = {dailyLastClaim:null, dailyStreak:0, objectivesClaimed:[]};
      state.prevRankName = "Bronze";
      state.confirmReset = false;
      clearMinuteInterval(); clearBallInterval();
      state.play = { formationKey:"balanced", myLineup:{}, activeSlot:null, subSlot:null, halfSubUsed:false, phase:"building", currentHalf:1, oppSlots:[], oppLineup:null, firstHalfLineup:null, finalResult:null, myGoals:0, oppGoals:0, commentary:"Kick off!", matchMinute:0, zoneResultsLive:{}, seasonSummary:null, minuteInterval:null, ballOwnerKey:null, ballInterval:null };
      render(); break;
    case "admin-add-gems":
      if(!isAdminDevice()) break;
      state.gems += Number(el.dataset.amount)||0; playChime(); render(); break;
    case "admin-set-gems-zero":
      if(!isAdminDevice()) break;
      state.gems = 0; render(); break;
    case "admin-unlock-all":
      if(!isAdminDevice()) break;
      state.players = state.players.map(p=>({...p, owned:true})); playFanfare(); render(); break;
    case "admin-lock-all": {
      if(!isAdminDevice()) break;
      const starterIds = new Set(STARTER_PLAYERS.filter(p=>p.owned).map(p=>p.id));
      state.players = state.players.map(p=>({...p, owned:starterIds.has(p.id)})); render(); break;
    }
    case "admin-add-wins": {
      if(!isAdminDevice()) break;
      const n = Number(el.dataset.amount)||0;
      state.stats.wins += n; state.stats.streak += n;
      state.stats.bestStreak = Math.max(state.stats.bestStreak, state.stats.streak);
      checkRankUp(); render(); break;
    }
    case "admin-advance-matchday": {
      if(!isAdminDevice()) break;
      const s = state.season;
      if(s.matchday>=6){ state.season = {number:s.number+1, matchday:1, points:0, wins:0, losses:0, draws:0}; }
      else { state.season = {...s, matchday:s.matchday+1}; }
      render(); break;
    }
    case "admin-players-add":
      if(!isAdminDevice()) break;
      adminAddPlayer(); break;
    case "admin-players-refresh":
      if(!isAdminDevice()) break;
      adminRefreshPlayers(); break;
    case "admin-players-delete":
      if(!isAdminDevice()) break;
      adminDeletePlayer(Number(el.dataset.playerId)); break;
  }
});
function handleFieldInput(e){
  const field = e.target.dataset.field;
  if(!field) return;
  if(field==="pasteCode"){ state.play.pasteCode = e.target.value; state.play.pasteError=""; return; }
  if(field==="adminName"){ state.adminPlayers.form.name = e.target.value; return; }
  if(field==="adminPower"){ state.adminPlayers.form.power = e.target.value; return; }
  if(field==="adminPosition"){ state.adminPlayers.form.position = e.target.value; return; }
  if(field==="adminRarity"){ state.adminPlayers.form.rarity = e.target.value; return; }
  if(field==="number"){ state.profile.number = Math.max(1, Math.min(99, Number(e.target.value)||1)); }
  else { state.profile[field] = e.target.value; }
  persist();
}
document.getElementById("stage").addEventListener("input", handleFieldInput);
document.getElementById("stage").addEventListener("change", handleFieldInput);

// ---------- global roster catalog (players.json) ----------
// The game boots instantly from local save / STARTER_PLAYERS above, then
// quietly checks players.json in the background for admin-added/edited
// cards and folds them in. This is what lets the admin-only "Manage
// Players" panel add new cards for every connected player (including
// friends on the public link) without needing anyone to update the app --
// they just need to reload. Existing local ownership is never touched by
// this merge; it only adds brand-new ids (always starting unowned) and
// refreshes stats/rarity on ids that already exist.
function mergeCatalog(remoteList){
  if(!Array.isArray(remoteList)) return false;
  const byId = {};
  state.players.forEach(p=>{ byId[p.id] = p; });
  let changed = false;
  remoteList.forEach(rp=>{
    if(!rp || typeof rp.id!=="number" || !rp.name || !rp.position || !rp.rarity) return;
    const existing = byId[rp.id];
    if(existing){
      if(existing.name!==rp.name || existing.position!==rp.position || existing.power!==rp.power || existing.rarity!==rp.rarity){
        existing.name = rp.name; existing.position = rp.position; existing.power = rp.power; existing.rarity = rp.rarity;
        changed = true;
      }
    } else {
      const fresh = {id:rp.id, name:rp.name, position:rp.position, power:rp.power, rarity:rp.rarity, owned:false};
      if(rp.exclusive){ fresh.exclusive = true; fresh.priceEUR = rp.priceEUR; }
      state.players.push(fresh);
      changed = true;
    }
  });
  return changed;
}
function loadRemoteCatalog(){
  fetch("players.json", {cache:"no-store"}).then(r=> r.ok ? r.json() : null).then(data=>{
    if(mergeCatalog(data)){ persist(); render(); }
  }).catch(()=>{});
}

render();
loadRemoteCatalog();
})();
